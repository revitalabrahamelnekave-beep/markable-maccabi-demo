AFTER_RENDER['pulse-active']=()=>{showPulseItem()};

function showPulseItem(){
  if(_sa.current>=_sa.trials.length){finishPulse();return}
  const el=$('#pulse-symbol');if(!el)return;
  _sa.responded=false;
  const t=_sa.trials[_sa.current];
  if(t.isTarget){
    el.innerHTML='<span style="color:var(--accent)">&#9733;</span>';
  } else {
    const shapes=['&#9675;','&#9633;','&#9651;','&#9734;'];
    el.innerHTML=`<span style="color:#ccc">${pick(shapes)}</span>`;
  }
  el.style.opacity='1';
  _sa.showTime=performance.now();
  _sa.timeout=setTimeout(()=>{
    if(!_sa.responded){
      _sa.trials[_sa.current].correct=!t.isTarget;
    }
    el.style.opacity='0';
    _sa.current++;
    setTimeout(()=>{
      if(_sa.current>=_sa.trials.length)finishPulse();
      else showPulseItem();
    },200);
  },1300);
}

function pulseResp(e){
  e.preventDefault();
  if(_sa.responded)return;
  _sa.responded=true;
  clearTimeout(_sa.timeout);
  const t=_sa.trials[_sa.current];
  t.responded=true;
  t.rt=round(performance.now()-_sa.showTime,1);
  t.correct=t.isTarget;
  if(t.correct)sndHit();else sndMiss();
  const el=$('#pulse-symbol');if(el)el.style.opacity='0';
  _sa.current++;
  setTimeout(()=>{
    if(_sa.current>=_sa.trials.length)finishPulse();
    else showPulseItem();
  },250);
}

function finishPulse(){
  const trials=_sa.trials;
  const targets=trials.filter(t=>t.isTarget);
  const nonT=trials.filter(t=>!t.isTarget);
  const hits=targets.filter(t=>t.responded);
  state.stageB.sustainedAttention.trials=trials;
  state.stageB.sustainedAttention.hitRate=targets.length?round(hits.length/targets.length*100,0):0;
  state.stageB.sustainedAttention.omissions=targets.filter(t=>!t.responded).length;
  state.stageB.sustainedAttention.falseAlarms=nonT.filter(t=>t.responded).length;
  const hitRTs=hits.map(t=>t.rt);
  if(hitRTs.length>=4){
    const mid=Math.floor(hitRTs.length/2);
    state.stageB.sustainedAttention.rtDrift=round(mean(hitRTs.slice(mid))-mean(hitRTs.slice(0,mid)),0);
  }
  sndSuccess();confetti();
  generateReport();
}

function determineProfile(){
  const s=state.signals;
  const retElev=s.retrieval==='elevated'||s.retrieval==='notable';
  const wmElev=s.workingMemory==='elevated'||s.workingMemory==='notable';
  const speedElev=s.processingSpeed==='elevated'||s.processingSpeed==='notable';
  const recallElev=s.delayedRecall==='elevated'||s.delayedRecall==='notable';
  const allStable=s.retrieval==='stable'&&s.workingMemory==='stable'&&s.processingSpeed==='stable'&&s.delayedRecall==='stable';
  const anyShifting=Object.values(s).filter(v=>typeof v==='string').some(v=>v==='shifting');
  const elevCount=[retElev,wmElev,speedElev,recallElev].filter(Boolean).length;

  if(allStable&&!anyShifting)return{

  };
  if(retElev&&recallElev&&!wmElev&&!speedElev)return{

  if(recallElev&&!retElev&&!wmElev&&!speedElev)return{
    name:'\u05D3\u05E4\u05D5\u05E1 \u05D2\u05D9\u05D1\u05D5\u05E9 \u05D6\u05D9\u05DB\u05E8\u05D5\u05DF',
    description:'\u05E9\u05D7\u05D6\u05D5\u05E8 \u05DE\u05D0\u05D5\u05D7\u05E8 \u05D3\u05E8\u05E9 \u05DE\u05D0\u05DE\u05E5 \u05E8\u05D1 \u05D9\u05D5\u05EA\u05E8 \u05D4\u05D9\u05D5\u05DD, \u05D1\u05E2\u05D5\u05D3 \u05D6\u05D9\u05DB\u05E8\u05D5\u05DF \u05DE\u05D9\u05D9\u05D3\u05D9 \u05D5\u05E9\u05DC\u05D9\u05E4\u05EA \u05DE\u05D9\u05DC\u05D9\u05DD \u05E0\u05E9\u05D0\u05E8\u05D5 \u05D9\u05E6\u05D9\u05D1\u05D9\u05DD. \u05D6\u05D4 \u05D9\u05DB\u05D5\u05DC \u05DC\u05E9\u05E7\u05E3 \u05D0\u05D9\u05DB\u05D5\u05EA \u05E9\u05D9\u05E0\u05D4, \u05D4\u05E1\u05D7\u05EA \u05D3\u05E2\u05EA \u05D1\u05D6\u05DE\u05DF \u05D4\u05E7\u05D9\u05D3\u05D5\u05D3, \u05D0\u05D5 \u05E9\u05D5\u05E0\u05D5\u05EA \u05D9\u05D5\u05DE\u05D9\u05D5\u05EA \u05D8\u05D1\u05E2\u05D9\u05D5\u05EA.'
  };
  if(anyShifting&&elevCount===0)return{
    name:'\u05D3\u05E4\u05D5\u05E1 \u05E9\u05DC \u05E9\u05D9\u05E0\u05D5\u05D9 \u05DE\u05EA\u05D4\u05D5\u05D5\u05D4',
    description:'\u05D7\u05DC\u05E7 \u05DE\u05D4\u05D0\u05D5\u05EA\u05D5\u05EA \u05DE\u05EA\u05E7\u05E8\u05D1\u05D9\u05DD \u05DC\u05E7\u05E6\u05D4 \u05D4\u05D8\u05D5\u05D5\u05D7 \u05D4\u05E6\u05E4\u05D5\u05D9 \u05D1\u05DC\u05D9 \u05DC\u05D4\u05D2\u05D9\u05E2 \u05DC\u05E1\u05E3 \u05DE\u05D5\u05D2\u05D1\u05E8. \u05DB\u05DE\u05D4 \u05D1\u05D3\u05D9\u05E7\u05D5\u05EA \u05E0\u05D5\u05E1\u05E4\u05D5\u05EA \u05D9\u05E2\u05D6\u05E8\u05D5 \u05DC\u05D4\u05D1\u05D7\u05D9\u05DF \u05D1\u05D9\u05DF \u05E9\u05D5\u05E0\u05D5\u05EA \u05D9\u05D5\u05DE\u05D9\u05D5\u05EA \u05D8\u05D1\u05E2\u05D9\u05D5\u05EA \u05DC\u05D1\u05D9\u05DF \u05E9\u05D9\u05E0\u05D5\u05D9 \u05DE\u05E9\u05DE\u05E2\u05D5\u05EA\u05D9.'
  };
  return{
    name:'\u05D3\u05E4\u05D5\u05E1 \u05D9\u05D5\u05DD \u05DE\u05E9\u05EA\u05E0\u05D4',
    description:'\u05E9\u05D9\u05DC\u05D5\u05D1 \u05E9\u05DC \u05D0\u05D5\u05EA\u05D5\u05EA \u05D9\u05E6\u05D9\u05D1\u05D9\u05DD \u05D5\u05DE\u05E9\u05EA\u05E0\u05D9\u05DD \u05D4\u05D9\u05D5\u05DD. \u05D1\u05E0\u05D9\u05D9\u05EA \u05DE\u05D2\u05DE\u05D4 \u05DC\u05D0\u05D5\u05E8\u05DA \u05DB\u05DE\u05D4 \u05D1\u05D3\u05D9\u05E7\u05D5\u05EA \u05EA\u05E2\u05D6\u05D5\u05E8 \u05DC\u05D4\u05E4\u05E8\u05D9\u05D3 \u05D1\u05D9\u05DF \u05EA\u05E0\u05D5\u05D3\u05D4 \u05D9\u05D5\u05DE\u05D9\u05D5\u05DE\u05D9\u05EA \u05DC\u05D3\u05E4\u05D5\u05E1 \u05DE\u05E9\u05DE\u05E2\u05D5\u05EA\u05D9.'
  };
}

function generateReport(){
  const rt=state.reaction,wf=state.wordFinding,ds=state.digitSpan,dr=state.delayedRecall;
  const flags=[];

  let speed='stable';
  if(rt.cv>40){speed='notable';flags.push('\u05E2\u05E7\u05D1\u05D9\u05D5\u05EA \u05D6\u05DE\u05DF \u05D4\u05EA\u05D2\u05D5\u05D1\u05D4 \u05D4\u05E9\u05EA\u05E0\u05EA\u05D4 \u05DE\u05D0\u05D5\u05D3 \u05D4\u05D9\u05D5\u05DD (CV '+rt.cv+'%)')}
  else if(rt.cv>32){speed='elevated';flags.push('\u05D6\u05DE\u05E0\u05D9 \u05D4\u05EA\u05D2\u05D5\u05D1\u05D4 \u05D4\u05D9\u05D5 \u05E4\u05D7\u05D5\u05EA \u05D0\u05D7\u05D9\u05D3\u05D9\u05DD \u05DE\u05D4\u05E8\u05D2\u05D9\u05DC')}
  else if(rt.cv>25)speed='shifting';
  if(rt.lapses>=4){flags.push('\u05E0\u05E6\u05E4\u05D5 \u05DB\u05DE\u05D4 \u05EA\u05D2\u05D5\u05D1\u05D5\u05EA \u05D0\u05D9\u05D8\u05D9\u05D5\u05EA ('+rt.lapses+')');if(speed==='stable')speed='shifting'}
  state.signals.processingSpeed=speed;

  let retrieval='stable';
  if(wf.uniqueValid<5){retrieval='notable';flags.push('\u05E9\u05DC\u05D9\u05E4\u05EA \u05DE\u05D9\u05DC\u05D9\u05DD \u05D3\u05E8\u05E9\u05D4 \u05DE\u05D0\u05DE\u05E5 \u05E8\u05D1 \u05D9\u05D5\u05EA\u05E8 \u05D4\u05D9\u05D5\u05DD ('+wf.uniqueValid+' \u05DE\u05D9\u05DC\u05D9\u05DD)')}
  else if(wf.uniqueValid<7){retrieval='elevated';flags.push('\u05E4\u05D7\u05D5\u05EA \u05DE\u05D9\u05DC\u05D9\u05DD \u05E2\u05DC\u05D5 \u05DC\u05E8\u05D0\u05E9 \u05DE\u05D4\u05E8\u05D2\u05D9\u05DC')}
  else if(wf.uniqueValid<9)retrieval='shifting';
  state.signals.retrieval=retrieval;

  let wm='stable';
  if(ds.maxForward<=3){wm='notable';flags.push('\u05D6\u05D9\u05DB\u05E8\u05D5\u05DF \u05E2\u05D1\u05D5\u05D3\u05D4 \u05D4\u05E8\u05D0\u05D4 \u05DE\u05D0\u05DE\u05E5 \u05E8\u05D1 \u05D9\u05D5\u05EA\u05E8 \u05D4\u05D9\u05D5\u05DD')}
  else if(ds.maxForward<=4&&ds.maxBackward<=2){wm='elevated';flags.push('\u05D8\u05D5\u05D5\u05D7 \u05E7\u05D3\u05D9\u05DE\u05D4 \u05D5\u05D0\u05D7\u05D5\u05E8\u05D4 \u05D4\u05D9\u05D5 \u05E7\u05E6\u05E8\u05D9\u05DD')}
  else if(ds.maxBackward<=2){wm='elevated';flags.push('\u05D6\u05DB\u05D9\u05E8\u05D4 \u05DC\u05D0\u05D7\u05D5\u05E8 \u05D3\u05E8\u05E9\u05D4 \u05DE\u05D0\u05DE\u05E5 \u05E8\u05D1 \u05D9\u05D5\u05EA\u05E8')}
  else if(ds.backwardCost>=3){wm='elevated';flags.push('\u05D4\u05D9\u05E4\u05D5\u05DA \u05E1\u05D3\u05E8\u05D5\u05EA \u05D3\u05E8\u05E9 \u05DE\u05D0\u05DE\u05E5 \u05E8\u05D1 \u05D9\u05D5\u05EA\u05E8')}
  else if(ds.backwardCost>=2)wm='shifting';
  state.signals.workingMemory=wm;

  let recall='stable';
  if(dr.freeScore===0){recall='notable';flags.push('\u05D4\u05E9\u05D7\u05D6\u05D5\u05E8 \u05D4\u05E6\u05D8\u05E8\u05DA \u05DC\u05E8\u05DE\u05D6\u05D9\u05DD \u05DB\u05D3\u05D9 \u05DC\u05D4\u05EA\u05E0\u05D9\u05E2. \u05D6\u05D4 \u05E0\u05E4\u05D5\u05E5 \u05DB\u05E9\u05D9\u05E9 \u05D4\u05E1\u05D7\u05EA \u05D3\u05E2\u05EA \u05D0\u05D5 \u05E2\u05D9\u05D9\u05E4\u05D5\u05EA.')}
  else if(dr.freeScore<=1&&dr.cuedScore<=2){recall='elevated';flags.push('\u05D2\u05DD \u05E9\u05D7\u05D6\u05D5\u05E8 \u05D7\u05D5\u05E4\u05E9\u05D9 \u05D5\u05D2\u05DD \u05E9\u05D7\u05D6\u05D5\u05E8 \u05E2\u05DD \u05E8\u05DE\u05D6\u05D9\u05DD \u05D4\u05E8\u05D0\u05D5 \u05DE\u05D0\u05DE\u05E5 \u05E8\u05D1')}
  else if(dr.freeScore<=1){recall='elevated';flags.push('\u05E9\u05D7\u05D6\u05D5\u05E8 \u05D7\u05D5\u05E4\u05E9\u05D9 \u05D4\u05D9\u05D4 \u05E0\u05DE\u05D5\u05DA \u05D0\u05D1\u05DC \u05E8\u05DE\u05D6\u05D9\u05DD \u05E2\u05D6\u05E8\u05D5, \u05DE\u05D4 \u05E9\u05DE\u05E6\u05D9\u05E2 \u05E2\u05DC \u05D3\u05E4\u05D5\u05E1 \u05E9\u05DC\u05D9\u05E4\u05D4')}
  else if(dr.freeScore<=2)recall='shifting';
  state.signals.delayedRecall=recall;

  state.signals.flags=flags;
  state.profile=determineProfile();
  render('report');
  setTimeout(()=>{confetti(25);sndSuccess()},400);
  saveSessionToHistory();
}

// ============================
// REPORT
// ============================

SCREENS['report']=()=>{
  const s=state.signals,rt=state.reaction,wf=state.wordFinding,ds=state.digitSpan,dr=state.delayedRecall;
  const v=state.validity,p=state.profile;
  const ts=state.stageB.taskSwitching,sa=state.stageB.sustainedAttention;
  const dur=round((Date.now()-state.sessionStart)/60000,1);

  const gauge=(label,level)=>`
    <div class="gauge">
      <div class="gauge-label"><span>${label}</span><span style="font-size:11px;color:var(--text-muted)">${getSignalLabel(level)}</span></div>
      <div class="gauge-track"><div class="gauge-fill ${getSignalClass(level)}"><div class="gauge-marker"></div></div></div>
      <div class="gauge-scale"><span>\u05D9\u05E6\u05D9\u05D1</span><span>\u05DE\u05E9\u05EA\u05E0\u05D4</span><span>\u05DE\u05D5\u05D2\u05D1\u05E8</span><span>\u05D1\u05D5\u05DC\u05D8</span></div>
    </div>`;

  return`
    <div class="text-center mb-16">
      <div class="eyebrow">\u05EA\u05DE\u05D5\u05E0\u05EA \u05D4\u05DE\u05E6\u05D1 \u05E9\u05DC\u05DA</div>
      <h2 style="font-size:20px;margin-bottom:4px">${new Date().toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'})}</h2>
      <p style="font-size:12px;color:var(--text-muted)">${dur} \u05D3\u05E7\u05D5\u05EA</p>
    </div>

    <div class="card" style="background:#f0faf8;border-color:#d0e8e4;margin-bottom:14px">
      <p style="font-size:13px;color:var(--text);line-height:1.7;margin:0">
        \u05D0\u05D5\u05EA\u05D5\u05EA \u05D0\u05DC\u05D4 \u05DE\u05E9\u05E7\u05E4\u05D9\u05DD \u05E8\u05D2\u05E2 \u05D1\u05D6\u05DE\u05DF \u05D1\u05DE\u05D4\u05DC\u05DA \u05DE\u05E2\u05D1\u05E8 \u05D1\u05D9\u05D5\u05DC\u05D5\u05D2\u05D9. \u05D4\u05DD \u05D0\u05D9\u05E0\u05DD \u05DE\u05D3\u05D3 \u05DC\u05D0\u05D9\u05E0\u05D8\u05DC\u05D9\u05D2\u05E0\u05E6\u05D9\u05D4 \u05E9\u05DC\u05DA, \u05DC\u05E2\u05EA\u05D9\u05D3\u05DA \u05D0\u05D5 \u05DC\u05E2\u05E8\u05DB\u05DA. \u05D0\u05E6\u05DC \u05E8\u05D5\u05D1 \u05D4\u05E0\u05E9\u05D9\u05DD, \u05D4\u05D3\u05E4\u05D5\u05E1\u05D9\u05DD \u05D4\u05E7\u05D5\u05D2\u05E0\u05D9\u05D8\u05D9\u05D1\u05D9\u05D9\u05DD \u05DE\u05EA\u05D9\u05D9\u05E6\u05D1\u05D9\u05DD \u05DC\u05D0\u05D7\u05E8 \u05D4\u05DE\u05E0\u05D5\u05E4\u05D0\u05D5\u05D6\u05D4.
      </p>
    </div>

    <div class="card">
      ${gauge('\u05DE\u05D4\u05D9\u05E8\u05D5\u05EA \u05E2\u05D9\u05D1\u05D5\u05D3',s.processingSpeed)}
      ${gauge('\u05E9\u05DC\u05D9\u05E4\u05EA \u05DE\u05D9\u05DC\u05D9\u05DD',s.retrieval)}
      ${gauge('\u05D6\u05D9\u05DB\u05E8\u05D5\u05DF \u05E2\u05D1\u05D5\u05D3\u05D4',s.workingMemory)}
      ${gauge('\u05E9\u05D7\u05D6\u05D5\u05E8 \u05DE\u05D0\u05D5\u05D7\u05E8',s.delayedRecall)}
    </div>

    ${s.flags.length?`
      <div class="card">
        <h3 style="font-size:14px;color:var(--accent);margin-bottom:8px">\u05DE\u05D4 \u05E9\u05DE\u05E0\u05D5 \u05DC\u05D1 \u05D0\u05DC\u05D9\u05D5 \u05D4\u05D9\u05D5\u05DD</h3>
        ${s.flags.map(f=>`<p style="font-size:13px;color:var(--text-secondary);padding:5px 0;border-bottom:1px solid var(--border-light)">${f}</p>`).join('')}
      </div>`:''}

    <div class="profile-card">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--accent);margin-bottom:6px">\u05D4\u05D3\u05E4\u05D5\u05E1 \u05E9\u05DC\u05DA \u05D4\u05D9\u05D5\u05DD</div>
      <div style="font-size:17px;font-weight:700;color:var(--navy);margin-bottom:4px">${p.name}</div>
      <div style="font-size:13px;color:var(--text-secondary);line-height:1.6">${p.description}</div>
    </div>

    <button class="btn btn-primary" onclick="if(window.parent!==window)window.parent.postMessage('think-done','*');" style="margin-bottom:20px">\u05D4\u05DE\u05E9\u05D9\u05DB\u05D9 \u05DC\u05EA\u05D5\u05E6\u05D0\u05D5\u05EA</button>

    <div class="disclaimer" style="padding-bottom:40px">
      THINK\u2122 Check \u05E2\u05DC \u05D9\u05D3\u05D9 MARKABLE\u2122 / Peritale.<br>
      \u05D0\u05D5\u05EA \u05E8\u05D5\u05D5\u05D7\u05D4 \u05DB\u05DC\u05DC\u05D9. \u05D0\u05D9\u05E0\u05D5 \u05DE\u05D4\u05D5\u05D5\u05D4 \u05D9\u05D9\u05E2\u05D5\u05E5 \u05E8\u05E4\u05D5\u05D0\u05D9.
      \u05D4\u05EA\u05D5\u05E6\u05D0\u05D5\u05EA \u05E2\u05E9\u05D5\u05D9\u05D5\u05EA \u05DC\u05D4\u05D9\u05D5\u05EA \u05DE\u05D5\u05E9\u05E4\u05E2\u05D5\u05EA \u05DE\u05E2\u05D9\u05D9\u05E4\u05D5\u05EA, \u05EA\u05E8\u05D5\u05E4\u05D5\u05EA, \u05DC\u05D7\u05E5, \u05E9\u05D9\u05E0\u05D4 \u05D5\u05E1\u05D1\u05D9\u05D1\u05D4.<br>
      &copy; ${new Date().getFullYear()} MARKABLE\u2122. \u05DB\u05DC \u05D4\u05D6\u05DB\u05D5\u05D9\u05D5\u05EA \u05E9\u05DE\u05D5\u05E8\u05D5\u05EA.
    </div>
  `;
};


// ============================
// SESSION GUARD
// ============================

window.addEventListener('beforeunload',e=>{if(state.sessionStart&&state.screen!=='report'){e.preventDefault();e.returnValue=''}});

// ============================
// SESSION HISTORY (localStorage)
// ============================

function saveSessionToHistory(){
  try{
    const entry={
      date:new Date().toISOString(),
      profile:state.profile.name,
      signals:{...state.signals},
      reaction:{median:state.reaction.median,cv:state.reaction.cv},
      words:state.wordFinding.uniqueValid,
      category:state.wordFinding.category,
      forward:state.digitSpan.maxForward,
      backward:state.digitSpan.maxBackward,
      freeRecall:state.delayedRecall.freeScore,
      cuedRecall:state.delayedRecall.cuedScore
    };
    const h=JSON.parse(localStorage.getItem('think_history')||'[]');
    h.push(entry);
    if(h.length>50)h.splice(0,h.length-50);
    localStorage.setItem('think_history',JSON.stringify(h));
  }catch(e){}
}

function getPreviousSession(){
  try{
    const h=JSON.parse(localStorage.getItem('think_history')||'[]');
    return h.length?h[h.length-1]:null;
  }catch(e){return null}
}

// ============================
// INIT
// ============================

render('intro');

</script>
