<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
<title>THINK - דגימה קוגניטיבית</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#D1409C;--accent-dark:#b8357f;--accent-light:#f5e0ee;--accent-bg:#fdf5fa;
  --navy:#1a1a2e;--navy-light:#2a2a4e;
  --text:#1a1a1a;--text-secondary:#555;--text-muted:#888;
  --bg:#ffffff;--bg-off:#f8f8fa;--border:#e4e4e8;--border-light:#eeeeef;
  --cyan:#3a9e95;--amber:#c48a2c;--coral:#c45a4a;
  --gradient:linear-gradient(135deg,#D1409C 0%,#9b2e8e 55%,#7b26a2 100%);
  --radius:14px;--radius-sm:10px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.03),0 2px 8px rgba(0,0,0,.04);
  --shadow-md:0 2px 8px rgba(0,0,0,.04),0 8px 28px rgba(0,0,0,.06);
  --font:'Heebo','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;overflow-x:hidden;line-height:1.6;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}
#app{
  max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;position:relative;
}

/* Nav */
.nav{
  position:sticky;top:0;z-index:100;
  background:rgba(255,255,255,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border-light);
}
.nav-logo{display:none}
.nav-logo svg{height:22px;width:auto}
.nav-step{font-size:11px;color:var(--text-muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase}

/* Constellation Progress */
.constellation{position:fixed;top:60px;right:16px;width:60px;height:60px;z-index:90}
.constellation svg{width:100%;height:100%}
.const-node{fill:#e0e0e4;transition:fill .5s ease,filter .5s ease}
.const-node.done{fill:var(--accent);filter:drop-shadow(0 0 5px rgba(209,64,156,.35))}
.const-node.active{fill:none;stroke:var(--accent);stroke-width:2;stroke-dasharray:3 3;animation:orbit 2s linear infinite}
.const-line{stroke:#e0e0e4;stroke-width:1;transition:stroke .6s ease}
.const-line.done{stroke:var(--accent);stroke-dasharray:none}
@keyframes orbit{to{stroke-dashoffset:-12}}

/* Screen */
.screen{
  flex:1;display:flex;flex-direction:column;padding:20px 20px 28px;
  animation:fadeIn .35s cubic-bezier(.25,.46,.45,.94);
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* Cards */
.card{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  padding:22px 24px;margin-bottom:14px;box-shadow:var(--shadow-sm);
}
.card-accent{border-color:var(--accent-light);background:var(--accent-bg);box-shadow:0 1px 4px rgba(209,64,156,.04),0 4px 16px rgba(209,64,156,.03)}

/* Typography */
.eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:3.5px;color:var(--accent);margin-bottom:16px}
h1{font-size:34px;font-weight:800;line-height:1.12;letter-spacing:-.4px;color:var(--navy);margin-bottom:12px}
h2{font-size:22px;font-weight:700;line-height:1.25;color:var(--navy);margin-bottom:10px}
h3{font-size:16px;font-weight:600;color:var(--navy);margin-bottom:8px}
.subtitle{font-size:14px;color:var(--text-secondary);line-height:1.65;margin-bottom:18px}
.label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2.2px;color:var(--text-muted);margin-bottom:8px}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border:none;border-radius:var(--radius-sm);font-family:var(--font);
  font-size:15px;font-weight:600;cursor:pointer;transition:all .2s ease;
  min-height:50px;padding:14px 28px;width:100%;
  -webkit-user-select:none;user-select:none;
}
.btn-primary{
  background:var(--gradient);color:#fff;
  box-shadow:0 2px 8px rgba(209,64,156,.18),0 6px 20px rgba(209,64,156,.12);
  position:relative;overflow:hidden;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(209,64,156,.22),0 10px 28px rgba(209,64,156,.18)}
.btn-primary:active{transform:translateY(0) scale(.98);box-shadow:0 2px 6px rgba(209,64,156,.15);transition-duration:.1s}
.btn-secondary{background:var(--bg-off);color:var(--text);border:1.5px solid var(--border);box-shadow:var(--shadow-sm)}
.btn-secondary:hover{border-color:#d0d0d4;background:#f4f4f6}
.btn-secondary:active{transform:scale(.98)}
.btn-ghost{background:transparent;color:var(--text-muted);min-height:40px;padding:8px 16px;font-size:13px}
.btn-ghost:hover{color:var(--text-secondary);background:rgba(0,0,0,.02)}
.btn:disabled{opacity:.35;pointer-events:none}

/* Input */
.input{
  width:100%;background:var(--bg);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);padding:14px 16px;font-size:16px;
  color:var(--text);font-family:var(--font);outline:none;transition:border-color .2s,box-shadow .2s;
}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(209,64,156,.08)}
.input::placeholder{color:#b0b0b8}

/* Chips */
.chip{
  display:inline-flex;align-items:center;padding:5px 12px;
  background:var(--accent-bg);border:1px solid var(--accent-light);
  border-radius:20px;font-size:12px;color:var(--accent-dark);font-weight:500;
  letter-spacing:.2px;
}

/* Timer ring */
.timer-ring{
  width:48px;height:48px;border-radius:50%;
  background:conic-gradient(var(--accent) calc(var(--pct,100) * 3.6deg),var(--border-light) 0);
  display:flex;align-items:center;justify-content:center;
  transition:background .3s ease;
  box-shadow:0 0 0 2px rgba(209,64,156,.06);
}
.timer-ring .inner{
  width:38px;height:38px;border-radius:50%;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:var(--navy);
  font-variant-numeric:tabular-nums;
}

/* ====== CONSTELLATION CATCH ====== */
.star-field{
  flex:1;min-height:300px;border-radius:var(--radius);position:relative;overflow:hidden;
  background:radial-gradient(ellipse at 40% 35%,#22223a 0%,#161628 45%,#0c0c18 100%);
  -webkit-user-select:none;user-select:none;cursor:pointer;
  touch-action:manipulation;-webkit-touch-callout:none;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 2px 12px rgba(0,0,0,.12);
}
.star-bg{position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(255,255,255,.25);box-shadow:0 0 2px rgba(255,255,255,.1)}
.star-target{
  position:absolute;
  background:radial-gradient(circle,rgba(209,64,156,.12) 0%,transparent 65%);
  filter:drop-shadow(0 0 16px rgba(209,64,156,.7)) drop-shadow(0 0 36px rgba(209,64,156,.35));
  animation:starAppear .28s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;justify-content:center;
  font-size:56px;color:#fff;
  text-shadow:0 0 16px var(--accent),0 0 36px rgba(209,64,156,.5),0 0 56px rgba(139,38,162,.25);
  padding:12px;margin:-12px;border-radius:50%;
}
@keyframes starAppear{from{transform:scale(0) rotate(-30deg);opacity:0}to{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes starPulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 20px rgba(209,64,156,.8))}50%{transform:scale(1.2);filter:drop-shadow(0 0 30px rgba(209,64,156,1))}}
@keyframes starFade{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.3) rotate(45deg)}}
.star-target.fading{animation:starFade 2s ease forwards}
.star-target.pulsing{animation:starPulse .8s ease infinite}
@keyframes screenShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-3px)}40%{transform:translateX(3px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
.screen-shake{animation:screenShake .3s ease}

/* Particles */
.particle{
  position:absolute;border-radius:50%;pointer-events:none;
  animation:particleBurst .55s cubic-bezier(.25,.46,.45,.94) forwards;
}
@keyframes particleBurst{
  0%{transform:translate(0,0) scale(1);opacity:1}
  70%{opacity:.6}
  100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}
}

/* Speed flash */
.speed-flash{
  position:absolute;font-size:14px;font-weight:700;pointer-events:none;
  animation:flashUp .7s cubic-bezier(.25,.46,.45,.94) forwards;
  font-variant-numeric:tabular-nums;
}
@keyframes flashUp{0%{opacity:1;transform:translateY(0) scale(1)}35%{transform:translateY(-10px) scale(1.08)}100%{opacity:0;transform:translateY(-38px) scale(.8)}}
@keyframes ringExpand{0%{transform:scale(.5);opacity:1}100%{transform:scale(1.8);opacity:0}}

/* Streak bar */
.streak-bar{display:flex;gap:6px;justify-content:center;margin:8px 0;padding:6px 0}
.streak-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.12);transition:all .35s cubic-bezier(.34,1.56,.64,1);border:1.5px solid rgba(255,255,255,.08)}
.streak-dot.hit{background:var(--accent);transform:scale(1.25);box-shadow:0 0 6px rgba(209,64,156,.45),0 0 12px rgba(209,64,156,.2);border-color:var(--accent)}
.streak-dot.miss{background:var(--coral);box-shadow:0 0 5px rgba(196,90,74,.35);border-color:var(--coral)}

/* Combo vignette */
@keyframes vignette{0%{opacity:0}50%{opacity:1}100%{opacity:0}}
.combo-vignette{
  position:absolute;inset:0;pointer-events:none;border-radius:var(--radius);
  box-shadow:inset 0 0 60px rgba(209,64,156,.3);
  animation:vignette .4s ease forwards;
}

/* ====== WORD GARDEN ====== */
.garden-wrap{flex:1;display:flex;flex-direction:column;min-height:0}
.garden-field{
  flex:1;min-height:260px;position:relative;overflow:hidden;
  background:linear-gradient(180deg,#e6f5e6 0%,#cde8cd 40%,#b4dab4 70%,#a0d0a0 100%);
  border-radius:var(--radius);border:1px solid #b8d4b8;
  box-shadow:inset 0 2px 8px rgba(0,80,0,.04),0 2px 8px rgba(0,0,0,.04);
}
.garden-ground{
  position:absolute;bottom:0;left:0;right:0;height:8px;
  background:linear-gradient(90deg,#7a9a5b,#5e8a3e,#7a9a5b);
  border-radius:0 0 var(--radius) var(--radius);
}
.flower{position:absolute;display:flex;flex-direction:column;align-items:center;transform-origin:bottom center}
.flower-stem{background:linear-gradient(to top,#2E7D32,#43A047,#66BB6A);border-radius:2px;position:relative;box-shadow:0 0 3px rgba(46,125,50,.3)}
.flower-leaf{
  position:absolute;width:10px;height:6px;border-radius:50% 0;transform-origin:left center;
}
.flower-label{font-size:8px;color:#3e5e28;margin-top:4px;white-space:nowrap;font-weight:600;text-shadow:0 0 3px #fff, 0 0 3px #fff}
/* Bloom animations per type */
@keyframes bloomSpring{0%{transform:scaleY(0) rotate(0deg);opacity:0}60%{transform:scaleY(1.1) rotate(-2deg)}80%{transform:scaleY(.95) rotate(1deg)}100%{transform:scaleY(1) rotate(0deg);opacity:1}}
@keyframes bloomBounce{0%{transform:scale(0) translateY(20px)}50%{transform:scale(1.2) translateY(-5px)}70%{transform:scale(.9) translateY(2px)}100%{transform:scale(1) translateY(0)}}
@keyframes bloomSpin{0%{transform:scale(0) rotate(-180deg);opacity:0}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes bloomPop{0%{transform:scale(0)}40%{transform:scale(1.3)}60%{transform:scale(.85)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes bloomDrop{0%{transform:translateY(-40px) scale(0);opacity:0}60%{transform:translateY(4px) scale(1.1)}100%{transform:translateY(0) scale(1);opacity:1}}
@keyframes bloomSwirl{0%{transform:scale(0) rotate(0deg)}50%{transform:scale(1.1) rotate(180deg)}100%{transform:scale(1) rotate(360deg)}}
@keyframes petalSway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes butterflyFloat{
  0%{transform:translate(0,0) scale(.7);opacity:0}
  20%{opacity:1}
  100%{transform:translate(var(--bx),var(--by)) scale(1);opacity:0}
}
.word-counter{
  font-size:28px;font-weight:800;color:var(--accent);text-align:center;
  transition:transform .2s;font-variant-numeric:tabular-nums;
}
.word-counter.pop{animation:counterPop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes counterPop{0%{transform:scale(1)}40%{transform:scale(1.25)}100%{transform:scale(1)}}

/* ====== ECHO CHAMBER ====== */
.chamber{position:relative;width:280px;height:280px;margin:0 auto}
.chamber-pad{
  position:absolute;width:46px;height:46px;border-radius:50%;
  background:#f2f2f4;border:2px solid #dddde0;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:var(--text-muted);
  cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);
  -webkit-user-select:none;user-select:none;
  touch-action:manipulation;-webkit-touch-callout:none;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.chamber-pad.lit{background:var(--accent);border-color:var(--accent);color:#fff;transform:scale(1.18);box-shadow:0 0 14px rgba(209,64,156,.35),0 0 28px rgba(209,64,156,.15)}
.chamber-pad.correct{background:var(--cyan);border-color:var(--cyan);color:#fff;box-shadow:0 0 10px rgba(58,158,149,.3)}
.chamber-pad.wrong{background:var(--coral);border-color:var(--coral);color:#fff;box-shadow:0 0 10px rgba(196,90,74,.3)}
.chamber-pad:active{transform:scale(.9);transition-duration:.08s}
.chamber-center{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:42px;font-weight:800;color:var(--navy);
  transition:opacity .25s ease;
}
.span-meter{display:flex;gap:5px;justify-content:center;margin:12px 0;padding:4px 0}
.span-seg{width:22px;height:6px;border-radius:3px;background:var(--border);transition:all .4s cubic-bezier(.34,1.56,.64,1)}
.span-seg.lit{background:var(--accent);box-shadow:0 0 6px rgba(209,64,156,.2)}

/* ====== MEMORY SCENE ====== */
.scene-wrap{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:280px;
}
.scene-card{
  width:100%;max-width:340px;aspect-ratio:4/3;border-radius:var(--radius);
  border:2px solid var(--border);background:var(--bg-off);
  position:relative;overflow:hidden;padding:22px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  box-shadow:var(--shadow-sm);
}
.scene-slot{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  border-radius:var(--radius-sm);border:1.5px dashed var(--border);
  min-width:140px;transition:all .3s ease;font-size:14px;color:var(--text-muted);
}
.scene-slot.filled{border-style:solid;border-color:var(--accent-light);background:var(--accent-bg);color:var(--navy);font-weight:600}
.scene-slot.filled .slot-icon{color:var(--accent)}
.color-circle{width:38px;height:38px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .18s ease;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.color-circle:hover{transform:scale(1.08);box-shadow:0 2px 8px rgba(0,0,0,.14)}
.color-circle.selected{border-color:var(--navy);transform:scale(1.15);box-shadow:0 2px 10px rgba(0,0,0,.18)}
.place-btn{
  padding:10px 16px;border-radius:20px;font-size:13px;font-weight:500;
  background:var(--bg-off);border:1.5px solid var(--border);cursor:pointer;
  transition:all .18s ease;font-family:var(--font);min-height:44px;
  display:inline-flex;align-items:center;
}
.place-btn:hover{border-color:var(--accent);background:#fdf8fb}
.place-btn.selected{background:var(--accent-bg);border-color:var(--accent);color:var(--accent-dark);font-weight:600}

/* ====== STAGE B ====== */
.sort-card{
  width:100px;height:130px;border-radius:16px;background:#fff;
  box-shadow:var(--shadow-md);display:flex;align-items:center;justify-content:center;
  font-size:40px;margin:0 auto;transition:transform .2s ease;
  touch-action:none;position:relative;
}
.sort-bins{display:flex;justify-content:space-between;gap:16px;margin-top:20px}
.sort-bin{
  flex:1;min-height:60px;border-radius:var(--radius-sm);
  border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--text-muted);font-weight:600;transition:all .2s ease;
}
.sort-bin.glow{border-color:var(--cyan);background:rgba(58,158,149,.05);box-shadow:0 0 12px rgba(58,158,149,.08)}

.pulse-line{width:100%;height:120px;position:relative;overflow:hidden;border-radius:var(--radius-sm);background:var(--bg-off);border:1px solid var(--border)}
.pulse-blip{
  position:absolute;top:50%;transform:translateY(-50%);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  animation:blipAppear .15s ease;cursor:pointer;
  transition:box-shadow .15s;
}
@keyframes blipAppear{from{transform:translateY(-50%) scale(0)}to{transform:translateY(-50%) scale(1)}}
.pulse-blip.target{width:28px;height:28px;background:var(--accent);box-shadow:0 0 10px rgba(209,64,156,.3)}
.pulse-blip.target:hover{box-shadow:0 0 16px rgba(209,64,156,.4)}
.pulse-blip.distractor{width:22px;height:22px;background:#d8d8dc}
.pulse-blip.hit{background:var(--cyan);animation:blipHit .2s ease}
@keyframes blipHit{0%{transform:translateY(-50%) scale(1)}50%{transform:translateY(-50%) scale(1.4)}100%{transform:translateY(-50%) scale(0)}}

/* ====== REPORT ====== */
.gauge{margin:16px 0}
.gauge-label{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:6px;display:flex;justify-content:space-between;align-items:baseline}
.gauge-track{height:7px;background:var(--border-light);border-radius:4px;position:relative;overflow:visible}
.gauge-fill{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.22,.61,.36,1)}
.gauge-fill.stable{background:linear-gradient(90deg,#4ab0a6,var(--cyan));width:20%}
.gauge-fill.shifting{background:linear-gradient(90deg,#d4a030,var(--amber));width:50%}
.gauge-fill.elevated{background:linear-gradient(90deg,#d06050,var(--coral));width:75%}
.gauge-fill.notable{background:linear-gradient(90deg,#b8357f,var(--accent));width:95%}
.gauge-marker{
  position:absolute;right:-7px;top:-4.5px;width:16px;height:16px;border-radius:50%;
  border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.04);
  transition:right 1s cubic-bezier(.22,.61,.36,1);
}
.gauge-fill.stable .gauge-marker{background:var(--cyan)}
.gauge-fill.shifting .gauge-marker{background:var(--amber)}
.gauge-fill.elevated .gauge-marker{background:var(--coral)}
.gauge-fill.notable .gauge-marker{background:var(--accent)}
.gauge-scale{display:flex;justify-content:space-between;font-size:9px;color:var(--text-muted);margin-top:4px;letter-spacing:.2px}

.profile-card{
  background:linear-gradient(135deg,#faf0f6 0%,#f0eaf6 50%,#ece5f4 100%);
  border:1px solid var(--accent-light);border-radius:var(--radius);
  padding:24px;text-align:center;margin-bottom:16px;
  box-shadow:0 2px 12px rgba(209,64,156,.05);
}
.report-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border-light)}
.report-row:last-child{border-bottom:none}

/* Confetti */
.confetti-container{position:fixed;top:50%;left:50%;pointer-events:none;z-index:300}
.confetti-dot{
  position:absolute;width:7px;height:7px;border-radius:50%;
  animation:confettiFly .7s ease forwards;
}
@keyframes confettiFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
@keyframes confettiPop{0%{transform:translate(0,0) scale(0) rotate(0deg);opacity:0}12%{opacity:1;transform:translate(0,0) scale(1.15)}100%{transform:translate(var(--dx),var(--dy)) scale(0) rotate(360deg);opacity:0}}

/* Task transition */
.task-done{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;text-align:center;animation:fadeIn .4s cubic-bezier(.25,.46,.45,.94);
}
.done-badge{
  width:68px;height:68px;border-radius:50%;
  background:linear-gradient(135deg,rgba(58,158,149,.12),rgba(58,158,149,.04));
  border:2.5px solid var(--cyan);display:flex;align-items:center;justify-content:center;

function fuzzyMatch(input,target){
  const a=input.toLowerCase().trim(),b=target.toLowerCase().trim();
  if(a===b)return true;if(a.length<2)return false;
  if(b.startsWith(a)&&b.length-a.length<=2)return true;
  if(a.startsWith(b)&&a.length-b.length<=1)return true;
  if(Math.abs(a.length-b.length)<=1){let d=0;for(let i=0;i<Math.max(a.length,b.length);i++){if(a[i]!==b[i])d++;if(d>1)return false}return true}

}

const AudioCtx=window.AudioContext||window.webkitAudioContext;
let _ctx=null;
function audio(){if(!_ctx)_ctx=new AudioCtx();if(_ctx.state==='suspended')_ctx.resume();return _ctx}

function tone(freq,dur,type='sine',vol=0.08){
  try{
    const c=audio();if(!c)return;
    const play=()=>{
      try{const o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+dur)}catch(e){}
    };
    if(c.state==='suspended'){c.resume().then(play).catch(()=>{})}else{play()}
  }catch(e){}
}

function confetti(count=30){
  const colors=['#D1409C','#8b26a2','#3a9e95','#e88d67','#f0c040','#ff6b9d','#4a90d9','#f5c6e0'];
  const shapes=['circle','square','star'];
  const c=document.createElement('div');c.className='confetti-container';
  for(let i=0;i<count;i++){
    const d=document.createElement('div');
    const shape=shapes[i%3];
    const angle=Math.random()*Math.PI*2,dist=60+Math.random()*120;
    const size=5+Math.random()*6;
    const rot=Math.random()*360;
    let borderR=shape==='circle'?'50%':shape==='star'?'2px':'2px';
    let extra=shape==='star'?`clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);`:'';
    d.style.cssText=`position:absolute;width:${size}px;height:${size}px;background:${colors[i%colors.length]};border-radius:${borderR};${extra}--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;animation:confettiPop .9s cubic-bezier(.22,1,.36,1) forwards;animation-delay:${(Math.random()*.15).toFixed(2)}s;transform:rotate(${rot}deg);opacity:0`;
    c.appendChild(d);
  }
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),1100);
}

  let svg='<svg viewBox="0 0 64 64">';

    svg+=`<line x1="${nodes[a].x}" y1="${nodes[a].y}" x2="${nodes[b].x}" y2="${nodes[b].y}" class="${cls}"/>`;
  });
  nodes.forEach((n,i)=>{
    let cls='const-node';
    if(i<state.tasksCompleted)cls+=' done';
    else if(i===state.tasksCompleted)cls+=' active';
    svg+=`<circle cx="${n.x}" cy="${n.y}" r="5" class="${cls}"/>`;
  });
  svg+='</svg>';
  return`<div class="constellation">${svg}</div>`;
}

// ============================
// RENDER
// ============================

function render(screenName){
  // Clean up cross-screen listeners and timers
  if(window._echoKeyHandler){document.removeEventListener('keydown',window._echoKeyHandler);window._echoKeyHandler=null}
  if(_ec.showInt){clearInterval(_ec.showInt);_ec.showInt=null}
  state.screen=screenName;
  const html=SCREENS[screenName]();
  const showNav=screenName!=='intro';
  // Hide constellation and step label during active gameplay
  const activeScreens=['react-field','garden-active','echo-chamber','scene-free','scene-cued','switch-active','pulse-active'];
  const isActive=activeScreens.includes(screenName);
  app().innerHTML=`
    ${showNav?`<div class="nav"><div class="nav-logo"></div><div class="nav-step">${isActive?'':getStepLabel()}</div></div>${isActive?'<div class="desktop-hint">\u05D4\u05E9\u05EA\u05DE\u05E9\u05D9 \u05D1\u05D7\u05E6\u05D9\u05DD \u05D0\u05D5 \u05D1\u05E2\u05DB\u05D1\u05E8 \u05DC\u05E0\u05D9\u05D5\u05D5\u05D8</div>':''}`:''}
    <div class="screen">${html}</div>
  `;
  if(AFTER_RENDER[screenName])AFTER_RENDER[screenName]();
  window.scrollTo(0,0);
}


function getStepLabel(){
  const s=state.screen;
  if(s.includes('recall-encode'))return'\u05E9\u05D9\u05E0\u05D5\u05DF';
  if(s.includes('react'))return'\u05DE\u05D4\u05D9\u05E8\u05D5\u05EA';
  if(s.includes('word')||s.includes('garden'))return'\u05DE\u05D9\u05DC\u05D9\u05DD';
  if(s.includes('echo')||s.includes('digit')||s.includes('chamber')||s.includes('between'))return'\u05D6\u05D9\u05DB\u05E8\u05D5\u05DF';
  if(s.includes('recall')||s.includes('scene'))return'\u05E9\u05D7\u05D6\u05D5\u05E8';
  if(s.includes('switch')||s.includes('attention')||s.includes('pulse'))return'\u05D1\u05D5\u05E0\u05D5\u05E1';
  if(s==='report')return'\u05EA\u05D5\u05E6\u05D0\u05D5\u05EA';
  return'';
}

SCREENS['intro']=()=>`
  <div class="spacer"></div>
  <div class="text-center mb-16">
    <h1><span dir="ltr">THINK\u2122</span></h1>
    <p style="font-size:14px;color:var(--text-muted);margin-top:4px">\u05D3\u05D2\u05D9\u05DE\u05EA \u05E7\u05E9\u05D1, \u05D6\u05D9\u05DB\u05E8\u05D5\u05DF \u05D5\u05DE\u05D4\u05D9\u05E8\u05D5\u05EA</p>
  </div>
  <div class="card card-accent">
    <p style="font-size:14px;color:var(--text);line-height:1.7">
      \u05DE\u05E2\u05D1\u05E8\u05D9\u05DD \u05D4\u05D5\u05E8\u05DE\u05D5\u05E0\u05DC\u05D9\u05D9\u05DD \u05E2\u05E9\u05D5\u05D9\u05D9\u05DD \u05DC\u05D4\u05E9\u05E4\u05D9\u05E2 \u05E2\u05DC \u05DE\u05D4\u05D9\u05E8\u05D5\u05EA \u05E2\u05D9\u05D1\u05D5\u05D3, \u05E9\u05DC\u05D9\u05E4\u05EA \u05DE\u05D9\u05DC\u05D9\u05DD, \u05D6\u05D9\u05DB\u05E8\u05D5\u05DF \u05E2\u05D1\u05D5\u05D3\u05D4 \u05D5\u05E9\u05D7\u05D6\u05D5\u05E8.
      \u05D1\u05D3\u05D9\u05E7\u05D4 \u05E7\u05E6\u05E8\u05D4 \u05D6\u05D5 \u05DC\u05D5\u05DB\u05D3\u05EA \u05EA\u05DE\u05D5\u05E0\u05EA \u05DE\u05E6\u05D1 \u05D1\u05D0\u05E8\u05D1\u05E2\u05EA \u05D4\u05EA\u05D7\u05D5\u05DE\u05D9\u05DD \u05D4\u05D0\u05DC\u05D4.
    </p>
    <div id="intro-more" style="display:none;margin-top:12px">
      <p style="font-size:13px;color:var(--text-secondary);line-height:1.7;margin-bottom:10px">
        \u05E0\u05E9\u05D9\u05DD \u05E8\u05D1\u05D5\u05EA \u05D7\u05D5\u05D5\u05EA \u05E9\u05D9\u05E0\u05D5\u05D9\u05D9\u05DD \u05D1\u05D6\u05D9\u05DB\u05E8\u05D5\u05DF, \u05D1\u05E8\u05D9\u05DB\u05D5\u05D6 \u05D5\u05D1\u05E9\u05DC\u05D9\u05E4\u05EA \u05DE\u05D9\u05DC\u05D9\u05DD \u05D1\u05EA\u05E7\u05D5\u05E4\u05EA \u05D4\u05E4\u05E8\u05D9\u05DE\u05E0\u05D5\u05E4\u05D0\u05D5\u05D6\u05D4. \u05DE\u05D7\u05E7\u05E8\u05D9\u05DD \u05DE\u05E6\u05D9\u05E2\u05D9\u05DD \u05E9\u05E9\u05D9\u05E0\u05D5\u05D9\u05D9\u05DD \u05D0\u05DC\u05D4 \u05E7\u05E9\u05D5\u05E8\u05D9\u05DD \u05DC\u05E8\u05DE\u05D5\u05EA \u05DE\u05E9\u05EA\u05E0\u05D5\u05EA \u05E9\u05DC \u05D0\u05E1\u05D8\u05E8\u05D5\u05D2\u05DF \u05D5\u05E4\u05E8\u05D5\u05D2\u05E1\u05D8\u05E8\u05D5\u05DF, \u05E9\u05DE\u05DE\u05DC\u05D0\u05D9\u05DD \u05EA\u05E4\u05E7\u05D9\u05D3 \u05D1\u05D0\u05D5\u05E4\u05DF \u05E9\u05D1\u05D5 \u05D4\u05DE\u05D5\u05D7 \u05DE\u05E2\u05D1\u05D3 \u05D5\u05E9\u05D5\u05DC\u05E3 \u05DE\u05D9\u05D3\u05E2.
      </p>
      <p style="font-size:13px;color:var(--text-secondary);line-height:1.7;margin-bottom:10px">
        \u05D4\u05D7\u05D3\u05E9\u05D5\u05EA \u05D4\u05D8\u05D5\u05D1\u05D5\u05EA: \u05D0\u05E6\u05DC \u05E8\u05D5\u05D1 \u05D4\u05E0\u05E9\u05D9\u05DD, \u05D6\u05D4\u05D5 \u05DE\u05E2\u05D1\u05E8, \u05DC\u05D0 \u05D9\u05E8\u05D9\u05D3\u05D4. \u05DE\u05E2\u05E7\u05D1 \u05D0\u05D7\u05E8 \u05D4\u05D3\u05E4\u05D5\u05E1\u05D9\u05DD \u05E9\u05DC\u05DA \u05DC\u05D0\u05D5\u05E8\u05DA \u05D6\u05DE\u05DF \u05D9\u05DB\u05D5\u05DC \u05DC\u05E2\u05D6\u05D5\u05E8 \u05DC\u05DA \u05DC\u05D4\u05D1\u05D9\u05DF \u05DE\u05D4 \u05DE\u05E9\u05EA\u05E0\u05D4 \u05D5\u05D4\u05D0\u05DD \u05D4\u05EA\u05D0\u05DE\u05D5\u05EA \u05D1\u05D0\u05D5\u05E8\u05D7 \u05D4\u05D7\u05D9\u05D9\u05DD \u05E2\u05D5\u05E9\u05D5\u05EA \u05D4\u05D1\u05D3\u05DC.
      </p>
      <p style="font-size:13px;font-weight:500;color:var(--navy);line-height:1.7;margin-bottom:4px">
        \u05E8\u05D5\u05E6\u05D4 \u05DC\u05D4\u05E2\u05DE\u05D9\u05E7?
      </p>

function beginSession(){
  state.sessionStart=Date.now();

  render('recall-encode');

`;};

function revealScene(){
  const ENCODE_TIME=12;
  const scene=$('#encode-scene');
  const btn=$('#encode-reveal-btn');
  const timerWrap=$('#encode-timer-wrap');
  if(!scene)return;

  const ri=state.recallItems;
  const col=COLORS_MAP[ri.color]||'var(--accent)';
  scene.innerHTML='<p dir="rtl" style="font-size:19px;font-weight:500;color:var(--navy);line-height:2.2;animation:fadeIn .4s ease;text-align:center">'
    +'<strong style="background:rgba(209,64,156,.08);padding:2px 8px;border-radius:6px">'+ri.name+'</strong> \u05D4\u05E9\u05D0\u05D9\u05E8/\u05D4 '
    +'<strong style="background:rgba(209,64,156,.08);padding:2px 8px;border-radius:6px">'+ri.object+'</strong> '
    +'<strong style="color:'+col+';background:rgba(209,64,156,.06);padding:2px 8px;border-radius:6px">'+ri.color+'</strong> '
    +'\u05D1'
    +'<strong style="background:rgba(209,64,156,.08);padding:2px 8px;border-radius:6px">'+ri.place+'</strong>.'
    +'</p><p style="font-size:12px;color:var(--text-muted);margin-top:12px">\u05E6\u05D9\u05D9\u05E8\u05D9 \u05D0\u05EA \u05D6\u05D4: \u05DE\u05D9, \u05D0\u05D9\u05D6\u05D4 \u05D7\u05E4\u05E5, \u05D0\u05D9\u05D6\u05D4 \u05E6\u05D1\u05E2, \u05D0\u05D9\u05E4\u05D4.</p>';

  if(btn)btn.style.display='none';
  if(timerWrap)timerWrap.style.display='flex';

  let t=ENCODE_TIME;
  const timerEl=$('#encode-timer'),ring=$('#encode-timer-ring'),label=$('#encode-timer-label');
  if(window._encodeTimer)clearInterval(window._encodeTimer);
  window._encodeTimer=setInterval(()=>{
    t--;
    if(timerEl)timerEl.textContent=t;
    if(ring)ring.style.setProperty('--pct',t/ENCODE_TIME*100);
    if(t<=3){
      if(ring)ring.style.background='conic-gradient(var(--coral) calc('+(t/ENCODE_TIME*100)+' * 3.6deg),var(--border-light) 0)';
      if(label)label.textContent=t===0?'':'\u05E6\u05DC\u05DE\u05D9 \u05EA\u05DE\u05D5\u05E0\u05D4 \u05D1\u05E8\u05D0\u05E9...';
    }
    if(t<=0){
      clearInterval(window._encodeTimer);window._encodeTimer=null;
      startConstellation();
    }
  },1000);
}

// ============================
// TASK 1: CONSTELLATION CATCH (Processing Speed)
// ============================

let _rt={};
const RT_SCORED=18;

function startConstellation(){
  if(window._encodeTimer){clearInterval(window._encodeTimer);window._encodeTimer=null}
  _rt={phase:'demo',trial:0,showTime:0,waiting:true,timeout:null,fadeTimeout:null,missTimeout:null,
       results:[],streak:0,maxStreak:0,practiceLeft:2};
  render('react-field');
}

function starFieldBg(){
  let s='';for(let i=0;i<25;i++){s+=`<div class="star-bg" style="left:${randInt(5,95)}%;top:${randInt(5,95)}%;opacity:${(.1+Math.random()*.2).toFixed(2)}"></div>`}return s;
}

SCREENS['react-field']=()=>{
  let dots='';for(let i=1;i<=RT_SCORED;i++){dots+=`<div class="streak-dot" id="sdot-${i}"></div>`}
  return`
    <div id="rt-header" style="text-align:center;padding:6px 4px;margin-bottom:4px">
      <div class="label" id="rt-phase-label" style="color:var(--accent);margin:0;font-size:22px;letter-spacing:4px;font-weight:800">\u05D4\u05D3\u05D2\u05DE\u05D4</div>
      <div id="rt-phase-sub" style="font-size:15px;color:var(--navy);font-weight:600;margin-top:6px">\u05E6\u05E4\u05D9: \u05D0\u05E0\u05D7\u05E0\u05D5 \u05E0\u05DC\u05D7\u05E5 \u05E2\u05DC \u05D4\u05DB\u05D5\u05DB\u05D1 \u05D1\u05E9\u05D1\u05D9\u05DC\u05DA. \u05D4\u05DE\u05D8\u05E8\u05D4 \u05E9\u05DC\u05DA: \u05DC\u05D7\u05E6\u05D9 \u05DE\u05D4\u05E8 \u05DB\u05DB\u05DC \u05E9\u05EA\u05D5\u05DB\u05DC\u05D9!</div>
    </div>
    <div class="streak-bar" id="rt-streak" style="display:none">${dots}</div>
    <div class="star-field" id="star-field" ontouchstart="prematureTap(event)" onmousedown="prematureTap(event)">
      ${starFieldBg()}
    </div>
  `;
};

AFTER_RENDER['react-field']=()=>{scheduleDemoStar()};

function updateStarHeader(){
  const lbl=$('#rt-phase-label'),sub=$('#rt-phase-sub'),streak=$('#rt-streak');
  if(_rt.phase==='demo'){
    if(lbl){lbl.textContent='\u05D4\u05D3\u05D2\u05DE\u05D4';lbl.style.color='var(--accent)';lbl.style.letterSpacing='4px';lbl.style.fontSize='22px';lbl.style.fontWeight='800'}
    if(sub){sub.textContent='\u05E6\u05E4\u05D9: \u05D0\u05E0\u05D7\u05E0\u05D5 \u05E0\u05DC\u05D7\u05E5 \u05E2\u05DC \u05D4\u05DB\u05D5\u05DB\u05D1 \u05D1\u05E9\u05D1\u05D9\u05DC\u05DA';sub.style.fontSize='15px';sub.style.fontWeight='600';sub.style.color='var(--navy)'}
    if(streak)streak.style.display='none';
  } else if(_rt.phase==='practice'){
    if(lbl){lbl.textContent='\u05EA\u05D5\u05E8\u05DA';lbl.style.color='var(--accent)';lbl.style.letterSpacing='3px';lbl.style.fontSize='18px'}
    if(sub){sub.textContent='\u05DC\u05D7\u05E6\u05D9 \u05E2\u05DC \u05D4\u05DB\u05D5\u05DB\u05D1 \u05DE\u05D4\u05E8 \u05DB\u05DB\u05DC \u05E9\u05EA\u05D5\u05DB\u05DC\u05D9!';sub.style.fontSize='15px';sub.style.fontWeight='600';sub.style.color='var(--navy)'}
    if(streak)streak.style.display='none';
  } else {
    if(lbl){lbl.textContent='\u05E1\u05D9\u05D1\u05D5\u05D1 '+_rt.trial+' \u05DE\u05EA\u05D5\u05DA '+RT_SCORED;lbl.style.color='var(--text-muted)';lbl.style.letterSpacing='0';lbl.style.fontSize='11px'}
    if(sub){sub.textContent='\u05E0\u05E9\u05D0\u05E8\u05D5 '+(RT_SCORED-_rt.trial);sub.style.fontSize='11px';sub.style.fontWeight='500';sub.style.color='var(--text-muted)'}
    if(streak)streak.style.display='flex';
  }
}

function scheduleDemoStar(){
  _rt.waiting=true;
  _rt.timeout=setTimeout(()=>{
    const field=$('#star-field');if(!field)return;
    _rt.waiting=false;
    const size=72;
    const fw=field.offsetWidth,fh=field.offsetHeight;
    const x=Math.floor(fw/2)-size/2+randInt(-30,30);
    const y=Math.floor(fh/2)-size/2+randInt(-20,20);
    const star=document.createElement('div');
    star.className='star-target';star.id='active-star';
    star.style.cssText='width:'+size+'px;height:'+size+'px;left:'+x+'px;top:'+y+'px;font-size:'+(size-8)+'px;cursor:default';
    star.textContent='\u2726';
    field.appendChild(star);sndTick();
    star.classList.add('pulsing');
    const cursor=document.createElement('div');
    cursor.style.cssText='position:absolute;left:10%;top:70%;width:24px;height:24px;z-index:50;pointer-events:none;transition:all 1.2s cubic-bezier(.4,0,.2,1);opacity:1';
    cursor.innerHTML='<svg viewBox="0 0 24 24" width="24" height="24"><path d="M5 3l14 8-6 2-3 6z" fill="#fff" stroke="#333" stroke-width="1.5" stroke-linejoin="round"/></svg>';
    field.appendChild(cursor);
    const starRect=star.getBoundingClientRect(),fieldR=field.getBoundingClientRect();
    const targetX=starRect.left-fieldR.left+starRect.width/2-12;
    const targetY=starRect.top-fieldR.top+starRect.height/2-8;
    requestAnimationFrame(()=>{cursor.style.left=targetX+'px';cursor.style.top=targetY+'px'});
    setTimeout(()=>{
      if(!$('#active-star')){cursor.remove();return}
      cursor.style.transform='scale(.8)';
      setTimeout(()=>{cursor.style.transform='scale(1)';cursor.style.opacity='0'},150);
      setTimeout(()=>cursor.remove(),500);
      star.classList.remove('pulsing');
      const rect=star.getBoundingClientRect(),fieldRect=field.getBoundingClientRect();
      const cx=rect.left-fieldRect.left+rect.width/2,cy=rect.top-fieldRect.top+rect.height/2;
      star.remove();
      sndHit();
      const pColors=['#D1409C','#fff','#8b26a2','#f5c6e0','#3a9e95'];
      for(let i=0;i<10;i++){const p=document.createElement('div');p.className='particle';const a=Math.random()*Math.PI*2,d=30+Math.random()*60;const sz=3+Math.random()*4;p.style.cssText='width:'+sz+'px;height:'+sz+'px;background:'+pColors[i%pColors.length]+';left:'+cx+'px;top:'+cy+'px;--dx:'+Math.cos(a)*d+'px;--dy:'+Math.sin(a)*d+'px;border-radius:50%';field.appendChild(p);setTimeout(()=>p.remove(),600)}
      const flash=document.createElement('div');flash.className='speed-flash';
      flash.style.cssText='left:'+(cx-28)+'px;top:'+(cy-30)+'px;color:#3a9e95;font-size:16px;font-weight:800;text-shadow:0 0 8px rgba(58,158,149,.4)';
      flash.textContent='280ms';field.appendChild(flash);setTimeout(()=>flash.remove(),1200);
      setTimeout(()=>{
        _rt.phase='practice';_rt.practiceLeft=2;
        updateStarHeader();
        scheduleStarTarget();
      },1200);
    },1400);
  },1500);
}

function showStartScoredButton(){
  clearTimeout(_rt.timeout);clearTimeout(_rt.fadeTimeout);clearTimeout(_rt.missTimeout);
  const lbl=$('#rt-phase-label'),sub=$('#rt-phase-sub');
  if(lbl){lbl.textContent='\u05DE\u05D5\u05DB\u05E0\u05D4?';lbl.style.color='var(--accent)';lbl.style.letterSpacing='3px';lbl.style.fontSize='20px';lbl.style.fontWeight='800'}
  if(sub){sub.textContent='10 \u05E1\u05D9\u05D1\u05D5\u05D1\u05D9\u05DD, \u05DC\u05D7\u05E6\u05D9 \u05DE\u05D4\u05E8 \u05DB\u05DB\u05DC \u05E9\u05EA\u05D5\u05DB\u05DC\u05D9';sub.style.fontSize='14px';sub.style.fontWeight='500';sub.style.color='var(--text-secondary)'}
  const field=$('#star-field');if(!field)return;
  const btn=document.createElement('div');
  btn.style.cssText='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;text-align:center;cursor:pointer;-webkit-user-select:none;user-select:none';
  btn.innerHTML='<div style="background:var(--gradient);color:#fff;padding:16px 40px;border-radius:8px;font-size:17px;font-weight:700;font-family:var(--font);box-shadow:0 4px 16px rgba(209,64,156,.3);transition:transform .15s" onmousedown="this.style.transform=\'scale(.95)\'" onmouseup="this.style.transform=\'scale(1)\'">\u05D9\u05D0\u05DC\u05DC\u05D4!</div>';
  btn.addEventListener('click',()=>{
    btn.remove();
    _rt.phase='scored';_rt.trial=1;
    updateStarHeader();
    scheduleStarTarget();
  });
  btn.addEventListener('touchstart',(e)=>{
    e.preventDefault();
    btn.remove();
    _rt.phase='scored';_rt.trial=1;
    updateStarHeader();
    scheduleStarTarget();
  },{passive:false});
  field.appendChild(btn);
}

function prematureTap(e){
  if(e.target.id==='star-field'||e.target.classList.contains('star-bg')){
    if(_rt.waiting){
      const field=$('#star-field');if(!field)return;
      const rect=field.getBoundingClientRect();
      const tx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
      const ty=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
      const flash=document.createElement('div');
      flash.style.cssText='position:absolute;left:'+(tx-20)+'px;top:'+(ty-15)+'px;font-size:11px;color:rgba(255,255,255,.4);pointer-events:none;animation:flashUp .5s ease forwards';
      flash.textContent='\u05D7\u05DB\u05D9...';
      field.appendChild(flash);setTimeout(()=>flash.remove(),500);
    }
  }
}

function getISI(){
  return 800+randInt(0,1000);
}

function scheduleStarTarget(){
  const delay=getISI();
  _rt.waiting=true;
  _rt.timeout=setTimeout(()=>{
    const field=$('#star-field');if(!field)return;
    _rt.waiting=false;
    _rt.showTime=performance.now();
    const prompt=$('#star-prompt');if(prompt)prompt.remove();
    const size=randInt(64,80);
    const fw=field.offsetWidth,fh=field.offsetHeight;
    const x=randInt(24,Math.max(24,fw-size-24));
    const y=randInt(24,Math.max(24,fh-size-24));
    const star=document.createElement('div');
    star.className='star-target';star.id='active-star';
    const pad=20;
    star.style.cssText=`width:${size}px;height:${size}px;left:${x-pad}px;top:${y-pad}px;padding:${pad}px;font-size:${size-8}px;cursor:pointer`;
    const starChars=['\u2726','\u2736','\u2605','\u2734','\u2733'];
    star.textContent=starChars[randInt(0,4)];
    star.addEventListener('touchstart',tapStar,{passive:false});
    star.addEventListener('mousedown',tapStar);
    field.appendChild(star);sndTick();
    if(_rt.phase==='scored')updateRoundLabel();
    star.classList.add('pulsing');
    _rt.fadeTimeout=setTimeout(()=>{
      if(!$('#active-star'))return;
      star.classList.remove('pulsing');star.classList.add('fading');
      _rt.missTimeout=setTimeout(()=>handleStarMiss(),2000);
    },800);
  },delay);
}

function handleStarMiss(){
  const star=$('#active-star');if(!star)return;star.remove();
  const field=$('#star-field');
  if(field){field.classList.add('screen-shake');setTimeout(()=>field.classList.remove('screen-shake'),300)}
  const missFlash=document.createElement('div');
  missFlash.style.cssText='position:absolute;inset:0;background:rgba(196,90,74,.08);pointer-events:none;border-radius:var(--radius);animation:vignette .4s ease forwards';
  if(field){field.appendChild(missFlash);setTimeout(()=>missFlash.remove(),400)}
  if(_rt.phase==='practice'){
    _rt.practiceLeft--;
    if(_rt.practiceLeft<=0){showStartScoredButton();return}
    setTimeout(()=>scheduleStarTarget(),600);return;
  }
  _rt.results.push({trial:_rt.trial,rt:-1,hit:false});
  updateStreakDot(_rt.trial,false);
  _rt.streak=0;_rt.trial++;
  if(_rt.trial>RT_SCORED){finishConstellation();return}
  scheduleStarTarget();
}

function updateStreakDot(trial,hit){
  const dot=$('#sdot-'+trial);
  if(dot)dot.classList.add(hit?'hit':'miss');
}
function updateRoundLabel(){
  const lbl=$('#rt-phase-label'),sub=$('#rt-phase-sub');
  if(lbl)lbl.textContent='\u05E1\u05D9\u05D1\u05D5\u05D1 '+_rt.trial+' \u05DE\u05EA\u05D5\u05DA '+RT_SCORED;
  if(sub)sub.textContent='\u05E0\u05E9\u05D0\u05E8\u05D5 '+(RT_SCORED-_rt.trial);
}

function tapStar(e){
  e.preventDefault();e.stopPropagation();
  const field=$('#star-field');if(!field)return;
  const star=$('#active-star');if(!star)return;
  clearTimeout(_rt.fadeTimeout);clearTimeout(_rt.missTimeout);
  const rt=performance.now()-_rt.showTime;
  const rect=star.getBoundingClientRect(),fieldRect=field.getBoundingClientRect();
  const cx=rect.left-fieldRect.left+rect.width/2,cy=rect.top-fieldRect.top+rect.height/2;
  star.remove();

  const colors=['#D1409C','#fff','#8b26a2','#f5c6e0','#3a9e95','#f0c040','#ff6b9d'];
  for(let i=0;i<14;i++){const p=document.createElement('div');p.className='particle';const a=Math.random()*Math.PI*2,d=35+Math.random()*80;const sz=3+Math.random()*5;p.style.cssText=`width:${sz}px;height:${sz}px;background:${colors[i%colors.length]};left:${cx}px;top:${cy}px;--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d}px;box-shadow:0 0 ${sz+2}px ${colors[i%colors.length]}80;border-radius:${Math.random()>.5?'50%':'2px'}`;field.appendChild(p);setTimeout(()=>p.remove(),600)}

  const flash=document.createElement('div');flash.className='speed-flash';
  flash.style.cssText=`left:${cx-28}px;top:${cy-30}px;color:#3a9e95;font-size:18px;font-weight:800;text-shadow:0 0 8px rgba(58,158,149,.4)`;
  flash.textContent=round(rt)+'ms';field.appendChild(flash);setTimeout(()=>flash.remove(),800);

  const ring=document.createElement('div');
  ring.style.cssText=`position:absolute;left:${cx-30}px;top:${cy-30}px;width:60px;height:60px;border-radius:50%;border:2.5px solid #3a9e95;pointer-events:none;animation:ringExpand .5s ease forwards;box-shadow:0 0 20px rgba(58,158,149,.5),inset 0 0 10px rgba(58,158,149,.2)`;
  field.appendChild(ring);setTimeout(()=>ring.remove(),500);
  sndHit();

  if(_rt.phase==='practice'){
    _rt.practiceLeft--;
    if(_rt.practiceLeft<=0){
      showStartScoredButton();return;
    }
    setTimeout(()=>scheduleStarTarget(),300);return;
  }

  _rt.results.push({trial:_rt.trial,rt:round(rt,1),hit:true});
  updateStreakDot(_rt.trial,true);
  _rt.streak++;if(_rt.streak>_rt.maxStreak)_rt.maxStreak=_rt.streak;

  if(_rt.streak>=3){const sc=document.createElement('div');sc.style.cssText=`position:absolute;top:12px;left:50%;transform:translateX(-50%);font-size:${12+_rt.streak}px;font-weight:800;color:rgba(255,255,255,.8);text-shadow:0 0 10px rgba(209,64,156,.6);pointer-events:none;animation:flashUp .8s ease forwards;z-index:10`;sc.textContent=_rt.streak+'x';field.appendChild(sc);setTimeout(()=>sc.remove(),800)}
  if(_rt.streak>=5&&_rt.streak%2===0){const vig=document.createElement('div');vig.className='combo-vignette';field.appendChild(vig);setTimeout(()=>vig.remove(),400);confetti(8)}

  _rt.trial++;
  if(_rt.trial>RT_SCORED){setTimeout(()=>finishConstellation(),300);return}
  setTimeout(()=>scheduleStarTarget(),150);
}

function finishConstellation(){
  sndSuccess();confetti();
  const scored=_rt.results.filter(r=>r.hit);
  let rts=scored.map(r=>r.rt);
  state.reaction.trials=_rt.results;
  rts=rts.filter(r=>r>=100);
  if(rts.length>=5){const m=mean(rts),s=stddev(rts);rts=rts.filter(r=>r<m+3*s)}
  state.reaction.validTrials=rts.length;
  state.reaction.median=round(median(rts),1);
  state.reaction.mean=round(mean(rts),1);
  state.reaction.sd=round(stddev(rts),1);
  state.reaction.cv=rts.length?round(stddev(rts)/mean(rts)*100,1):0;
  state.reaction.lapses=rts.filter(r=>r>500).length;
  state.reaction.premature=scored.filter(r=>r.rt<100).length;
  if(scored.filter(r=>r.rt<150).length>=3)state.validity.flags.push('Multiple unrealistically fast responses');
  if(rts.length>5&&stddev(rts)<15)state.validity.flags.push('Ultra-low RT variance');
  if(rts.length<7)state.validity.flags.push('Few valid reaction time trials');
  state.tasksCompleted=1;
  showTransition('\u05DE\u05D4\u05D9\u05E8\u05D5\u05EA \u05E0\u05E7\u05DC\u05D8\u05D4!',state.reaction.median+'ms \u05D6\u05DE\u05DF \u05EA\u05D2\u05D5\u05D1\u05D4',()=>render('garden-intro'));
}

function toggleVoiceInput(){

    if(fb){fb.textContent='\u05E7\u05DC\u05D8 \u05E7\u05D5\u05DC\u05D9 \u05DC\u05D0 \u05E0\u05EA\u05DE\u05DA \u05D1\u05D3\u05E4\u05D3\u05E4\u05DF \u05D6\u05D4';fb.style.color='var(--coral)'}

  _voiceRecog.continuous=true;
  _voiceRecog.interimResults=false;

    _voiceActive=false;
    if(btn){btn.style.background='var(--bg-off)';btn.style.borderColor='var(--border)';btn.style.color='var(--text)'}
    if(fb&&e.error!=='aborted'){fb.textContent='\u05E9\u05D2\u05D9\u05D0\u05EA \u05E7\u05D5\u05DC: '+e.error;fb.style.color='var(--coral)'}
  };
  _voiceRecog.onend=()=>{
    if(_voiceActive){try{_voiceRecog.start()}catch(e){}}
  };
  _voiceRecog.start();
  _voiceActive=true;
  if(btn){btn.style.background='var(--accent)';btn.style.borderColor='var(--accent)';btn.style.color='#fff'}
  if(fb){fb.textContent='\u05DE\u05E7\u05E9\u05D9\u05D1\u05D4... \u05D0\u05DE\u05E8\u05D9 \u05DE\u05D9\u05DC\u05D9\u05DD \u05D0\u05D7\u05EA \u05D0\u05D7\u05EA';fb.style.color='var(--accent)'}
}

function submitGardenWord(){
  const inp=$('#wf-input');if(!inp)return;
  const fb=$('#wf-feedback');
  const parts=inp.value.split(/[,;\s]+/).map(w=>w.trim().toLowerCase()).filter(w=>w.length>0);
  inp.value='';
  if(parts.length===0){
    if(fb){fb.textContent='\u05D4\u05E7\u05DC\u05D9\u05D3\u05D9 \u05DE\u05D9\u05DC\u05D4 \u05E7\u05D5\u05D3\u05DD...';fb.style.color='var(--amber)';setTimeout(()=>{if(fb){fb.textContent='';fb.style.color=''}},2000)}
    inp.focus();return;
  }
  let lastMsg='';
  for(const raw of parts){
    if(_gd.words.includes(raw)){_gd.reps++;lastMsg='\u05DB\u05D1\u05E8 \u05E0\u05D0\u05DE\u05E8: '+raw;continue}
    // Accept Hebrew words (2+ chars) or check English list
    const list=WORD_LISTS[state.wordFinding.category];
    let valid=raw.length>=2;
    if(/^[a-z]+$/.test(raw)){valid=list.has(raw);if(!valid)for(const w of list){if(fuzzyMatch(raw,w)){valid=true;break}}}
    if(valid){
      _gd.words.push(raw);
      _gd.timestamps.push(performance.now()-_gd.startTime);
      lastMsg='';
      sndWord();
      const cnt=$('#wf-count');
      if(cnt){cnt.textContent=_gd.words.length;cnt.classList.remove('pop');void cnt.offsetWidth;cnt.classList.add('pop')}
      bloomFlower(raw);
    } else {
      lastMsg='\u05DC\u05D0 \u05D1\u05E7\u05D8\u05D2\u05D5\u05E8\u05D9\u05D4: '+raw;
    }
  }
  if(fb)fb.textContent=lastMsg;
  inp.focus();
}

function bloomFlower(word){
  const field=$('#garden-field');if(!field)return;
  const fw=field.offsetWidth,fh=field.offsetHeight;
  const n=_gd.words.length;
  const PALETTES=[
    {base:'#FF1493',light:'#FF6EB4',dark:'#C71585'},
    {base:'#AA00FF',light:'#D580FF',dark:'#7B00B5'},
    {base:'#6C3CE0',light:'#A07BFF',dark:'#4400AA'},
    {base:'#2979FF',light:'#82B1FF',dark:'#0D47A1'},
    {base:'#00E5CC',light:'#80FFF0',dark:'#009688'},
    {base:'#FF3D00',light:'#FF8A65',dark:'#BF2C00'},
    {base:'#FFAB00',light:'#FFD54F',dark:'#FF8F00'},
    {base:'#FF1744',light:'#FF6B7A',dark:'#C41230'},
    {base:'#E040FB',light:'#F08FFF',dark:'#AA00FF'},
    {base:'#FF4081',light:'#FF80AB',dark:'#F50057'},
    {base:'#651FFF',light:'#A47BFF',dark:'#4A00C8'},
    {base:'#FF6D00',light:'#FFB74D',dark:'#E65100'},
  ];
  const pal=PALETTES[(word.charCodeAt(0)+n*3)%PALETTES.length];
  const {base:color,light:colorL,dark:colorD}=pal;
  const cols=Math.max(3,Math.floor(fw/55));
  const col=n%cols;const row=Math.floor(n/cols);
  const x=10+col*((fw-20)/cols)+randInt(-12,12);
  const heightClass=n%3;
  const baseH=[45,75,110][heightClass];
  const stemH=baseH+Math.random()*40+row*8;
  const stemW=2.5+Math.random()*2;
  const types=['peony','tulip','dahlia','poppy','magnolia','bell','orchid','lotus','wildrose','cosmos'];
  const type=types[(word.length+word.charCodeAt(0)+n)%types.length];
  const anims=['bloomSpring','bloomBounce','bloomSpin','bloomPop','bloomDrop','bloomSwirl'];
  const anim=anims[n%anims.length];
  const dur=(.3+Math.random()*.3).toFixed(2);
  const swaySpeed=(1.5+Math.random()*3).toFixed(1);
  const sway=`animation:petalSway ${swaySpeed}s ease-in-out infinite;animation-delay:${(Math.random()*2).toFixed(1)}s;`;
  const clampedX=Math.max(5,Math.min(fw-45,x));
  const flower=document.createElement('div');
  flower.className='flower';
  flower.style.cssText=`left:${clampedX}px;bottom:6px;animation:${anim} ${dur}s ease both;z-index:${10+n}`;

  let headHTML='';
  const sz=Math.min(110,45+word.length*7+Math.random()*22);
  const glow=`filter:drop-shadow(0 0 ${sz*.3}px ${color}90) drop-shadow(0 0 ${sz*.15}px ${color}50)`;

  if(type==='peony'){
    let petals='';const layers=4;
    for(let l=0;l<layers;l++){
      const pc=5+l*2;const lsz=sz*(.3+l*.2);
      for(let i=0;i<pc;i++){
        const a=i*(360/pc)+l*12+randInt(-8,8);
        const clr=l<2?color:l===2?colorL:colorL;
        petals+=`<div style="position:absolute;width:${lsz*.45}px;height:${lsz*.65}px;background:linear-gradient(${a}deg,${clr},${l>1?colorL:color});border-radius:50%;top:50%;left:50%;transform:translate(-50%,-${55+l*12}%) rotate(${a}deg);transform-origin:center bottom;opacity:${(.6+l*.1).toFixed(1)};box-shadow:inset 0 -2px 4px ${colorD}30"></div>`;
      }
    }
    headHTML=`<div style="position:relative;width:${sz*1.8}px;height:${sz*1.8}px;${sway};${glow}">${petals}<div style="position:absolute;width:${sz*.2}px;height:${sz*.2}px;background:radial-gradient(#FFF9C4,#FFD54F);border-radius:50%;top:48%;left:50%;transform:translate(-50%,-50%);z-index:5;box-shadow:0 0 ${sz*.15}px #FFD54F80"></div></div>`;
  } else if(type==='tulip'){
    const h=sz*1.3;const w=sz*.65;
    headHTML=`<div style="${sway};${glow}"><div style="width:${w}px;height:${h}px;background:linear-gradient(160deg,${colorD},${color},${colorL});border-radius:${w*.5}px ${w*.5}px ${w*.12}px ${w*.12}px;box-shadow:0 0 ${sz*.2}px ${color}60,inset ${w*.08}px 0 ${w*.15}px rgba(255,255,255,.2);position:relative;overflow:hidden"><div style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(to right,rgba(255,255,255,.12),transparent 40%,rgba(0,0,0,.06))"></div></div></div>`;
  } else if(type==='dahlia'){
    let petals='';const totalP=14+randInt(0,8);
    for(let i=0;i<totalP;i++){
      const a=i*137.5;
      const dist=sz*.05+i*(sz*.03);const pw=sz*.18+i*.5;const ph=sz*.3+i*.8;
      const dx=Math.cos(a*Math.PI/180)*dist;const dy=Math.sin(a*Math.PI/180)*dist;
      const op=(.5+i/totalP*.5).toFixed(2);
      petals+=`<div style="position:absolute;width:${pw}px;height:${ph}px;background:linear-gradient(to top,${color},${i>totalP/2?colorL:color});border-radius:50%;top:${50-dy/sz*50}%;left:${50+dx/sz*50}%;transform:translate(-50%,-50%) rotate(${a}deg);opacity:${op};box-shadow:inset 0 -1px 3px ${colorD}20"></div>`;
    }
    headHTML=`<div style="position:relative;width:${sz*1.7}px;height:${sz*1.7}px;${sway};${glow}">${petals}<div style="position:absolute;width:${sz*.18}px;height:${sz*.18}px;background:radial-gradient(#FFF9C4,#FFD54F);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;box-shadow:0 0 ${sz*.12}px #FFD54F80"></div></div>`;
  } else if(type==='poppy'){
    let petals='';const pc=4+randInt(0,2);
    for(let i=0;i<pc;i++){
      const a=i*(360/pc)+randInt(-10,10);const pw=sz*.55;const ph=sz*.65;
      petals+=`<div style="position:absolute;width:${pw}px;height:${ph}px;background:radial-gradient(${colorL} 10%,${color} 50%,${colorD});border-radius:50%;top:50%;left:50%;transform:translate(-50%,-100%) rotate(${a}deg);transform-origin:center bottom;box-shadow:0 0 ${sz*.1}px ${color}40"></div>`;
    }
    headHTML=`<div style="position:relative;width:${sz*1.6}px;height:${sz*1.6}px;${sway};${glow}">${petals}<div style="position:absolute;width:${sz*.3}px;height:${sz*.3}px;background:radial-gradient(#1B1B1B,#333);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1;box-shadow:0 0 6px rgba(0,0,0,.3)"></div></div>`;
  } else if(type==='magnolia'){
    let petals='';const pc=6+randInt(0,3);
    for(let i=0;i<pc;i++){
      const a=i*(360/pc)+randInt(-6,6);const pw=sz*.3;const ph=sz*.7;
      petals+=`<div style="position:absolute;width:${pw}px;height:${ph}px;background:linear-gradient(to top,${colorD},${color},${colorL});border-radius:50% 50% 20% 20%;top:50%;left:50%;transform:translate(-50%,-95%) rotate(${a}deg);transform-origin:center bottom;box-shadow:0 0 ${sz*.08}px ${color}50"></div>`;
    }
    headHTML=`<div style="position:relative;width:${sz*1.7}px;height:${sz*1.7}px;${sway};${glow}">${petals}<div style="position:absolute;width:${sz*.22}px;height:${sz*.22}px;background:radial-gradient(#FFF9C4,#FFCC80,${color});border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;box-shadow:0 0 ${sz*.15}px ${colorL}60"></div></div>`;
  } else if(type==='bell'){
    const bw=sz*.6,bh=sz*1.2;
    headHTML=`<div style="${sway};${glow}"><div style="width:${bw}px;height:${bh}px;background:linear-gradient(170deg,${colorD},${color},${colorL});border-radius:${bw*.1}px ${bw*.1}px ${bw*.4}px ${bw*.4}px;box-shadow:0 0 ${bw*.25}px ${color}50,inset ${bw*.06}px 0 ${bw*.12}px rgba(255,255,255,.18);position:relative"><div style="position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:7px;height:7px;background:radial-gradient(#FFF9C4,#FFD54F);border-radius:50%;box-shadow:0 0 8px #FFD54F80"></div></div></div>`;
  } else if(type==='orchid'){
    let petals='';
    const shapes=[[1,.65,35],[.65,1,-35],[.55,1.1,0],[1.1,.5,80],[.5,.8,130]];
    shapes.forEach(([w,h,r],i)=>{
      const oclr=i<3?color:colorL;
      petals+=`<div style="position:absolute;width:${sz*w*.55}px;height:${sz*h*.55}px;background:linear-gradient(${r}deg,${oclr},${i<2?colorD:colorL});border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%) rotate(${r+randInt(-15,15)}deg);box-shadow:0 0 ${sz*.08}px ${color}40"></div>`;
    });
    headHTML=`<div style="position:relative;width:${sz*1.7}px;height:${sz*1.7}px;${sway};${glow}">${petals}<div style="position:absolute;width:${sz*.2}px;height:${sz*.24}px;background:radial-gradient(#FFF9C4,${colorL});border-radius:35%;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;box-shadow:0 0 ${sz*.12}px ${colorL}60"></div></div>`;
  } else if(type==='lotus'){
    let petals='';
    for(let l=0;l<4;l++){
      const pc=5+l*2;const lsz=sz*(.45+l*.2);
      for(let i=0;i<pc;i++){
        const a=i*(360/pc)+l*15;
        const clr=l<2?colorD:l===2?color:colorL;
        petals+=`<div style="position:absolute;width:${lsz*.28}px;height:${lsz*.5}px;background:linear-gradient(to top,${clr},${colorL});border-radius:50% 50% 6% 6%;top:50%;left:50%;transform:translate(-50%,-${55+l*13}%) rotate(${a}deg);transform-origin:center bottom;opacity:${(.5+l*.14).toFixed(1)};box-shadow:0 0 ${lsz*.06}px ${clr}40"></div>`;
      }
    }
    headHTML=`<div style="position:relative;width:${sz*1.8}px;height:${sz*1.8}px;${sway};${glow}">${petals}<div style="position:absolute;width:${sz*.26}px;height:${sz*.26}px;background:radial-gradient(#FFF9C4,#FFD54F,#FFB300);border-radius:50%;top:46%;left:50%;transform:translate(-50%,-50%);z-index:5;box-shadow:0 0 ${sz*.2}px #FFD54F90"></div></div>`;
  } else if(type==='wildrose'){
    let petals='';const pc=5;
    for(let i=0;i<pc;i++){
      const a=i*(360/pc)+randInt(-8,8);const pw=sz*.5;const ph=sz*.55;
      petals+=`<div style="position:absolute;width:${pw}px;height:${ph}px;background:radial-gradient(ellipse at 50% 70%,${colorL} 15%,${color} 55%,${colorD} 95%);border-radius:50% 50% 45% 45%;top:50%;left:50%;transform:translate(-50%,-95%) rotate(${a}deg);transform-origin:center bottom;box-shadow:inset 0 ${ph*.1}px ${ph*.15}px rgba(255,255,255,.2),0 0 ${sz*.08}px ${color}40"></div>`;
    }
    headHTML=`<div style="position:relative;width:${sz*1.6}px;height:${sz*1.6}px;${sway};${glow}">${petals}<div style="position:absolute;width:${sz*.28}px;height:${sz*.28}px;background:radial-gradient(#FFF9C4,#FFD54F,#FFA000);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;box-shadow:0 0 ${sz*.15}px #FFD54F90"></div></div>`;
  } else {
    let petals='';const pc=8;
    for(let i=0;i<pc;i++){
      const a=i*(360/pc);const pw=sz*.22;const ph=sz*.55;
      petals+=`<div style="position:absolute;width:${pw}px;height:${ph}px;background:linear-gradient(to top,${colorD},${color});border-radius:50% 50% 30% 30%;top:50%;left:50%;transform:translate(-50%,-100%) rotate(${a}deg);transform-origin:center bottom;box-shadow:0 0 ${sz*.06}px ${color}40"></div>`;
    }
    headHTML=`<div style="position:relative;width:${sz*1.6}px;height:${sz*1.6}px;${sway};${glow}">${petals}<div style="position:absolute;width:${sz*.24}px;height:${sz*.24}px;background:radial-gradient(#FFF9C4,#FFD54F);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;box-shadow:0 0 ${sz*.15}px #FFD54F80"></div></div>`;
  }

  const stemLean=randInt(-14,14);
  const stemCurve=randInt(-18,18);
  const stemThick=3+Math.random()*2;
  const stemColor=['#3a8a2a','#4a9e3a','#2d7a1f','#348a34'][randInt(0,3)];
  const stemDark=['#2d6e1f','#256818','#1e5a14'][randInt(0,2)];
  const stemLight=['#5aaa4a','#6bbe5a','#70c460'][randInt(0,2)];
  const sx=20,ex=20+stemCurve,ey=stemH;
  const cp1x=sx+stemLean,cp1y=stemH*.33,cp2x=sx-stemLean+stemCurve,cp2y=stemH*.66;
  const svgW=60;
  let stemSVG=`<svg width="${svgW}" height="${stemH+4}" viewBox="0 0 ${svgW} ${stemH+4}" style="overflow:visible">`;
  stemSVG+=`<path d="M${sx},2 C${cp1x},${cp1y} ${cp2x},${cp2y} ${ex},${ey}" fill="none" stroke="${stemColor}" stroke-width="${stemThick}" stroke-linecap="round"/>`;
  stemSVG+=`<path d="M${sx-.5},2 C${cp1x-.5},${cp1y} ${cp2x-.5},${cp2y} ${ex-.5},${ey}" fill="none" stroke="${stemLight}" stroke-width="${stemThick*.35}" stroke-linecap="round" opacity=".4"/>`;
  const leafCount=1+Math.floor(Math.random()*3);
  for(let l=0;l<leafCount;l++){
    const lt=.2+l*.22+Math.random()*.08;
    const t=lt,t2=t*t,t3=t2*t,mt=1-t,mt2=mt*mt,mt3=mt2*mt;
    const lx=mt3*sx+3*mt2*t*cp1x+3*mt*t2*cp2x+t3*ex;
    const ly=mt3*2+3*mt2*t*cp1y+3*mt*t2*cp2y+t3*ey;
    const lSide=(l%2===0)?1:-1;
    const lLen=12+Math.random()*12;
    const lWid=5+Math.random()*4;
    const lAngle=lSide*(25+Math.random()*35);
    const leafG=['#3a8a2a','#48a038','#4a9e3a','#3d9030'][randInt(0,3)];
    const leafD=['#2d6e1f','#256818'][randInt(0,1)];
    const tipX=lx+lSide*lLen*Math.cos(lAngle*Math.PI/180);
    const tipY=ly-lLen*Math.sin(Math.abs(lAngle)*Math.PI/180)*.3;
    stemSVG+=`<path d="M${lx},${ly} Q${lx+lSide*lLen*.5},${ly-lWid} ${tipX},${tipY} Q${lx+lSide*lLen*.5},${ly+lWid} ${lx},${ly}" fill="${leafG}" opacity=".88" stroke="${leafD}" stroke-width=".4"/>`;
    stemSVG+=`<path d="M${lx},${ly} Q${lx+lSide*lLen*.45},${ly-lWid*.15} ${tipX},${tipY}" fill="none" stroke="${leafD}" stroke-width=".7" opacity=".5"/>`;
    for(let v=1;v<=2;v++){
      const vt=v*.3;
      const vx=lx+(tipX-lx)*vt;

      stemSVG+=`<line x1="${vx}" y1="${vy}" x2="${vx+lSide*lWid*.6}" y2="${vy-lWid*.4}" stroke="${leafD}" stroke-width=".4" opacity=".35"/>`;

  stemSVG+=`</svg>`;

  const flowerLean=randInt(-6,6);
  flower.style.cssText+=`;transform:rotate(${flowerLean}deg)`;

  flower.innerHTML=`
    ${headHTML}
    <div style="display:flex;justify-content:center;margin-top:-2px">${stemSVG}</div>

  field.appendChild(flower);

  for(let i=0;i<8;i++){
    const sp=document.createElement('div');

    field.appendChild(sp);setTimeout(()=>sp.remove(),700);

  if(n>=5&&n%2===0){
    for(let i=0;i<4+Math.floor(n/3);i++){
      const pollen=document.createElement('div');
      const px=randInt(10,fw-10),py=randInt(10,fh-20);

      pollen.style.cssText=`position:absolute;left:${px}px;top:${py}px;width:${pSz}px;height:${pSz}px;border-radius:50%;background:${pColor};pointer-events:none;opacity:.7;animation:butterflyFloat ${2+Math.random()*2}s ease forwards;--bx:${randInt(-40,40)}px;--by:${randInt(-60,-20)}px;box-shadow:0 0 ${pSz+3}px ${pColor}80`;
      field.appendChild(pollen);setTimeout(()=>pollen.remove(),4000);
    }
  }

  if(n>0&&n%4===0){
    for(let b=0;b<1+Math.floor(n/8);b++){
      const bf=document.createElement('div');
      const bx=randInt(-100,100),by=randInt(-120,-40);
      const bfSz=16+Math.random()*12;
      bf.style.cssText=`position:absolute;left:${randInt(20,fw-40)}px;bottom:${randInt(40,fh-20)}px;pointer-events:none;animation:butterflyFloat ${2+Math.random()*2}s ease forwards;--bx:${bx}px;--by:${by}px;z-index:100`;
      bf.innerHTML='<svg viewBox="0 0 24 24" width="'+bfSz+'" height="'+bfSz+'"><circle cx="12" cy="14" r="2" fill="#FFD54F" opacity=".8"/><ellipse cx="7" cy="10" rx="5" ry="6" fill="'+color+'" opacity=".6" transform="rotate(-15 7 10)"/><ellipse cx="17" cy="10" rx="5" ry="6" fill="'+colorL+'" opacity=".6" transform="rotate(15 17 10)"/><ellipse cx="8" cy="15" rx="3" ry="4" fill="'+colorL+'" opacity=".4" transform="rotate(-10 8 15)"/><ellipse cx="16" cy="15" rx="3" ry="4" fill="'+color+'" opacity=".4" transform="rotate(10 16 15)"/></svg>';
      field.appendChild(bf);setTimeout(()=>bf.remove(),3500);
    }
  }

  if(n===4){
    field.style.background='linear-gradient(180deg,#e0f5e0 0%,#c8e8c8 50%,#a8d8a8 100%)';
  } else if(n===7){
    field.style.background='linear-gradient(180deg,#d8f0e0 0%,#b8e4c0 40%,#90d4a0 100%)';
    field.style.borderColor='#90c890';
  } else if(n===10){
    field.style.background='linear-gradient(180deg,#d0ecd0 0%,#b0dcb0 40%,#88cc88 100%)';
    field.style.borderColor='#80c080';
    field.style.boxShadow='inset 0 0 30px rgba(240,200,64,.06)';
    confetti(12);
  } else if(n===14){
    field.style.background='linear-gradient(180deg,#e8f0d8 0%,#c8e4b0 30%,#a0d890 60%,#80c870 100%)';
    field.style.borderColor='#70b860';
    field.style.boxShadow='inset 0 0 50px rgba(240,200,64,.1),0 0 15px rgba(80,180,80,.08)';
    confetti(20);
    const glow=document.createElement('div');
    glow.style.cssText='position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 30%,rgba(255,230,140,.12),transparent 70%);z-index:0;border-radius:inherit';
    field.appendChild(glow);
  } else if(n===18){
    field.style.background='linear-gradient(180deg,#d0ecd0 0%,#a0d8a0 30%,#70c870 60%,#50b850 90%,#40a040 100%)';
    field.style.boxShadow='inset 0 0 60px rgba(255,215,0,.14),0 0 25px rgba(80,180,80,.12)';

function finishGarden(){
  clearInterval(_gd.timerInt);
  if(_voiceRecog){try{_voiceRecog.stop()}catch(e){}}_voiceActive=false;
  sndSuccess();confetti();
  const ts=_gd.timestamps;
  state.wordFinding.words=_gd.words;
  state.wordFinding.timestamps=ts;
  state.wordFinding.uniqueValid=_gd.words.length;
  state.wordFinding.repetitions=_gd.reps;
  state.wordFinding.firstLatency=ts.length?round(ts[0],0):25000;
  if(ts.length>1){
    const intervals=[];for(let i=1;i<ts.length;i++)intervals.push(ts[i]-ts[i-1]);
    state.wordFinding.meanInterval=round(mean(intervals),0);
  }
  if(state.wordFinding.category==='Animals'&&_gd.words.length>1){
    let switches=0,last=null;
    for(const w of _gd.words){
      let c=null;for(const[k,v]of Object.entries(ANIMAL_CLUSTERS)){if(v.includes(w)){c=k;break}}
      if(last!==null&&c!==last)switches++;last=c;
    }
    state.wordFinding.clustering=switches;
  }
  if(ts.length>=3){
    const ints=[];for(let i=1;i<ts.length;i++)ints.push(ts[i]-ts[i-1]);
    if(ints.length>2&&stddev(ints)<200)state.validity.flags.push('Uniform word timing');
  }
  state.tasksCompleted=2;
  showTransition('\u05D4\u05D2\u05DF \u05D4\u05D5\u05E9\u05DC\u05DD!',`${_gd.words.length} \u05DE\u05D9\u05DC\u05D9\u05DD \u05E4\u05E8\u05D7\u05D5`,()=>render('echo-intro'));
}

let _ec={};

function startEcho(direction){
  _ec={direction,length:direction==='forward'?4:3,trial:0,roundsLeft:direction==='forward'?4:3,maxSpan:0,
       results:[],seq:[],phase:'show',showIdx:0,showInt:null,userInput:[],padCount:9,
       trialAtLevel:0,failsAtLevel:0};
  nextEchoTrial();
}

function nextEchoTrial(){
  if(_ec.roundsLeft<=0||_ec.length>8){finishEchoDirection();return}
  _ec.seq=[];
  const used=new Set();
  for(let i=0;i<_ec.length;i++){let d;do{d=randInt(1,9)}while(used.has(d)&&used.size<9);used.add(d);_ec.seq.push(d)}
  _ec.phase='show';_ec.showIdx=0;_ec.userInput=[];
  render('echo-chamber');
}

SCREENS['echo-chamber']=()=>{
  const pads=[];
  const chamberSize=Math.min(280,window.innerWidth-60);
  const center=chamberSize/2;
  const r=chamberSize*0.39;
  const padSize=Math.max(44,chamberSize*0.16);
  for(let i=1;i<=9;i++){
    const angle=(i-1)*(2*Math.PI/9)-Math.PI/2;

  }
  const maxPossible=_ec.direction==='forward'?7:6;
  let meter='';
  for(let i=1;i<=maxPossible;i++){
    meter+=`<div class="span-seg ${i<=_ec.maxSpan?'lit':''}"></div>`;
  }
  const enteredDisplay=_ec.phase==='input'?_ec.userInput.map(d=>`<span style="display:inline-block;width:28px;height:28px;border-radius:50%;background:var(--accent-bg);border:1px solid var(--accent-light);text-align:center;line-height:28px;font-size:14px;font-weight:600;color:var(--accent)">${d}</span>`).join(''):'';
  return`

    <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-top:4px">
      <div id="echo-instruction" style="font-size:15px;color:var(--navy);font-weight:600">
        ${_ec.phase==='show'?'\u05E6\u05E4\u05D9 \u05D1\u05E1\u05D3\u05E8\u05D4...':(_ec.direction==='forward'?'\u05D4\u05E7\u05D9\u05E9\u05D9 \u05D1\u05D0\u05D5\u05EA\u05D5 \u05E1\u05D3\u05E8':'\u05D4\u05E7\u05D9\u05E9\u05D9 \u05D1\u05E1\u05D3\u05E8 \u05D4\u05E4\u05D5\u05DA')}
      </div>
      ${_ec.phase==='input'?'<button onclick="echoUndo()" style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:var(--font)">\u05D1\u05D8\u05DC\u05D9</button>':''}
    </div>
  `;
};

AFTER_RENDER['echo-chamber']=()=>{
  if(_ec.phase==='show')showEchoSequence();
  window._echoKeyHandler=function(e){
    const d=parseInt(e.key);
    if(d>=1&&d<=9)echoTap(d);
    if(e.key==='Backspace')echoUndo();
  };
  document.addEventListener('keydown',window._echoKeyHandler);
};

function showEchoSequence(){
  _ec.showIdx=0;
  const center=$('#echo-center');
  _ec.showInt=setInterval(()=>{
    $$('.chamber-pad').forEach(p=>p.classList.remove('lit'));
    if(center)center.textContent='';
    if(_ec.showIdx<_ec.seq.length){
      const d=_ec.seq[_ec.showIdx];
      const pad=$(`#pad-${d}`);
      if(pad)pad.classList.add('lit');
      if(center)center.textContent=d;
      sndPadTone(d);
      _ec.showIdx++;
      setTimeout(()=>{if(pad)pad.classList.remove('lit');if(center)center.textContent=''},550);
    } else {
      clearInterval(_ec.showInt);
      _ec.phase='input';
      const inst=$('#echo-instruction');
      if(inst)inst.textContent=_ec.direction==='forward'?'\u05E2\u05DB\u05E9\u05D9\u05D5 \u05D4\u05E7\u05D9\u05E9\u05D9 \u05D1\u05D0\u05D5\u05EA\u05D5 \u05E1\u05D3\u05E8':'\u05E2\u05DB\u05E9\u05D9\u05D5 \u05D4\u05E7\u05D9\u05E9\u05D9 \u05D1\u05E1\u05D3\u05E8 \u05D4\u05E4\u05D5\u05DA';
    }
  },900);
}

function echoUndo(){
  if(_ec.phase!=='input'||_ec.userInput.length===0)return;
  _ec.userInput.pop();
  const entered=$('#echo-entered');
  if(entered){
    entered.innerHTML=_ec.userInput.map(d=>`<span style="display:inline-block;width:28px;height:28px;border-radius:50%;background:var(--accent-bg);border:1px solid var(--accent-light);text-align:center;line-height:28px;font-size:14px;font-weight:600;color:var(--accent)">${d}</span>`).join('');
  }
}

function echoTap(digit){
  if(_ec.phase!=='input')return;
  const pad=$(`#pad-${digit}`);
  sndPadTone(digit);
  _ec.userInput.push(digit);
  if(pad){pad.classList.add('lit');setTimeout(()=>pad.classList.remove('lit'),150)}
  const entered=$('#echo-entered');
  if(entered){
    entered.innerHTML=_ec.userInput.map(d=>`<span style="display:inline-block;width:28px;height:28px;border-radius:50%;background:var(--accent-bg);border:1px solid var(--accent-light);text-align:center;line-height:28px;font-size:14px;font-weight:600;color:var(--accent)">${d}</span>`).join('');
  }
  const expected=_ec.direction==='forward'?_ec.seq:[..._ec.seq].reverse();
  if(_ec.userInput.length===expected.length){
    const correct=_ec.userInput.every((v,i)=>v===expected[i]);
    _ec.results.push({length:_ec.length,correct});
    _ec.trialAtLevel++;
    _ec.trial++;
    if(correct){
      _ec.maxSpan=_ec.length;
      sndSuccess();
      $$('.chamber-pad').forEach((p,i)=>{setTimeout(()=>{p.classList.add('correct');setTimeout(()=>p.classList.remove('correct'),500)},i*40)});
      const center=$('#echo-center');
      if(center){center.innerHTML='<span style="color:var(--cyan);font-size:22px;animation:badgePop .4s ease">\u2713</span>'}
      confetti(12);
      _ec.length++;_ec.trialAtLevel=0;_ec.failsAtLevel=0;_ec.roundsLeft--;
      setTimeout(()=>nextEchoTrial(),700);
    } else {
      _ec.failsAtLevel++;
      sndMiss();
      $$('.chamber-pad').forEach(p=>{p.classList.add('wrong');setTimeout(()=>p.classList.remove('wrong'),500)});
      const chamber=$('#echo-chamber');
      if(chamber){chamber.classList.add('screen-shake');setTimeout(()=>chamber.classList.remove('screen-shake'),300)}
      const center=$('#echo-center');
      if(center){center.innerHTML='<span style="color:var(--coral);font-size:20px">\u2717</span>'}
      if(_ec.failsAtLevel>=2){
        setTimeout(()=>finishEchoDirection(),900);
      } else {
        setTimeout(()=>nextEchoTrial(),700);
      }
    }
  }
}

function finishEchoDirection(){
  if(window._echoKeyHandler){document.removeEventListener('keydown',window._echoKeyHandler);window._echoKeyHandler=null}
  if(_ec.direction==='forward'){
    state.digitSpan.forwardTrials=_ec.results;
    state.digitSpan.maxForward=_ec.maxSpan||_ec.length-1;
    state.digitSpan.fwdAccuracy=_ec.results.length?round(_ec.results.filter(r=>r.correct).length/_ec.results.length*100,0):0;
    render('echo-between');
  } else {
    state.digitSpan.backwardTrials=_ec.results;
    state.digitSpan.maxBackward=_ec.maxSpan||_ec.length-1;
    state.digitSpan.bwdAccuracy=_ec.results.length?round(_ec.results.filter(r=>r.correct).length/_ec.results.length*100,0):0;
    state.digitSpan.backwardCost=state.digitSpan.maxForward-state.digitSpan.maxBackward;
    sndSuccess();confetti();
    state.tasksCompleted=3;
    showTransition('\u05D6\u05D9\u05DB\u05E8\u05D5\u05DF \u05E0\u05E7\u05DC\u05D8!','\u05E7\u05D3\u05D9\u05DE\u05D4: '+state.digitSpan.maxForward+' / \u05DC\u05D0\u05D7\u05D5\u05E8: '+state.digitSpan.maxBackward,()=>render('scene-free'));
  }
}

function pickPlace(el){

function submitSceneFree(){
  const nameEl=$('#fr-name'),objEl=$('#fr-object');
  const resp={
    name:nameEl?nameEl.value.trim().toLowerCase():'',
    color:_selectedColor,
    object:objEl?objEl.value.trim().toLowerCase():'',
    place:_selectedPlace
  };
  state.delayedRecall.freeResponses=resp;
  let score=0;
  if(resp.name&&fuzzyMatch(resp.name,state.recallItems.name))score++;
  if(resp.color&&resp.color===state.recallItems.color)score++;
  if(resp.object&&fuzzyMatch(resp.object,state.recallItems.object))score++;
  if(resp.place&&resp.place===state.recallItems.place)score++;
  state.delayedRecall.freeScore=score;

  if(score===4){
    state.delayedRecall.cuedScore=4;state.delayedRecall.cueBenefit=0;
    finishRecall();
  } else {
    render('scene-cued');
  }
}

let _cuedAnswers={};
function cuedPick(el){
  const key=el.dataset.cued;
  _cuedAnswers[key]=el.dataset.val;
  const siblings=el.parentElement.querySelectorAll('[data-cued]');
  siblings.forEach(s=>{s.classList.remove('selected');s.style.borderColor=''});
  el.classList.add('selected');
}

function submitCued(){
  let score=state.delayedRecall.freeScore;
  for(const[key,val]of Object.entries(_cuedAnswers)){
    if(val===state.recallItems[key])score++;
  }
  state.delayedRecall.cuedScore=score;
  state.delayedRecall.cueBenefit=score-state.delayedRecall.freeScore;
  _cuedAnswers={};
  finishRecall();
}

function finishRecall(){
  sndSuccess();confetti();
  state.tasksCompleted=4;
  evaluateValidity();
  evaluateStageBTrigger();
  if(state.stageB.triggered){
    render('stageb-decision');
  } else {
    generateReport();
  }
}

function evaluateValidity(){
  const v=state.validity;
  const elapsed=Date.now()-state.sessionStart;
  if(elapsed<60000)v.flags.push('Session completed unusually quickly');
  v.label=v.flags.length<=1?'high':v.flags.length<=2?'moderate':'low';
}

function evaluateStageBTrigger(){
  let count=0;
  const reasons=[];
  const rt=state.reaction, wf=state.wordFinding, ds=state.digitSpan, dr=state.delayedRecall;

  if(rt.cv>40){count+=2;reasons.push('Reaction consistency')}
  if(wf.uniqueValid<5){count+=2;reasons.push('Word retrieval')}
  if(ds.maxBackward<=2){count+=2;reasons.push('Working memory')}
  if(dr.freeScore===0){count+=2;reasons.push('Recall pattern')}

  if(rt.cv>28&&rt.cv<=40){count++;reasons.push('Reaction variability')}
  if(wf.uniqueValid>=5&&wf.uniqueValid<8){count++;reasons.push('Word finding pace')}
  if(ds.backwardCost>=2){count++;reasons.push('Memory load')}
  if(dr.freeScore<=1&&dr.cuedScore>=3){count++;reasons.push('Retrieval vs encoding')}
  else if(dr.freeScore<=2&&dr.cuedScore<=2){count++;reasons.push('Encoding effort')}
  if(rt.lapses>=3){count++;reasons.push('Processing consistency')}

  state.stageB.triggered=count>=2;
  state.stageB.triggerReasons=reasons;
  state.stageB.triggerCount=count;
}

function scShapeHTML(shape,colorHex,size){
  const s=size||48;
  if(shape==='circle')return`<div style="width:${s}px;height:${s}px;border-radius:50%;background:${colorHex}"></div>`;
  if(shape==='square')return`<div style="width:${s}px;height:${s}px;border-radius:4px;background:${colorHex}"></div>`;

  if(shape==='diamond')return`<div style="width:${s*.7}px;height:${s*.7}px;background:${colorHex};transform:rotate(45deg);border-radius:3px"></div>`;
  if(shape==='star')return`<div style="font-size:${s}px;color:${colorHex};line-height:1">\u2605</div>`;
  return'';
}

let _sw={};

function startSwitch(){
  const total=14;const trials=[];let lastRule=null;
  for(let i=0;i<total;i++){
    const shape=pick(SC_SHAPES);
    const color=pick(SC_COLORS);
    let rule;
    if(!lastRule)rule=pick(['color','shape']);
    else rule=Math.random()<0.45?(lastRule==='color'?'shape':'color'):lastRule;
    let bins;
    if(rule==='color'){
      const other=pick(SC_COLORS.filter(c=>c.name!==color.name));
      bins=Math.random()<.5?[color,other]:[other,color];
    } else {
      const other=pick(SC_SHAPES.filter(s=>s!==shape));
      bins=Math.random()<.5?[shape,other]:[other,shape];
    }
    const correctIdx=rule==='color'?bins.findIndex(b=>b.name===color.name):bins.findIndex(b=>b===shape);
    trials.push({shape,color,rule,bins,correctIdx,isSwitch:lastRule!==null&&rule!==lastRule,response:null,correct:null,rt:0});
    lastRule=rule;
  }
  _sw={trials,current:0,showTime:0,score:0};
  render('switch-active');
}

AFTER_RENDER['switch-active']=()=>{_sw.showTime=performance.now()};

function switchResp(binIdx){
  const t=_sw.trials[_sw.current];
  t.rt=round(performance.now()-_sw.showTime,1);
  t.response=binIdx;
  t.correct=binIdx===t.correctIdx;
  if(t.correct){sndHit();_sw.score++}else sndMiss();
  const card=$('#sw-card');
  if(card){card.style.transform=t.correct?'scale(1.1)':'scale(.9) rotate(5deg)';card.style.opacity='.5'}
  _sw.current++;
  setTimeout(()=>{
    if(_sw.current>=_sw.trials.length)finishSwitch();
    else render('switch-active');
  },350);
}

function finishSwitch(){
  const trials=_sw.trials;
  const correct=trials.filter(t=>t.correct);
  state.stageB.taskSwitching.trials=trials;
  state.stageB.taskSwitching.accuracy=round(correct.length/trials.length*100,0);
  const sw=trials.filter(t=>t.isSwitch&&t.correct).map(t=>t.rt);
  const rp=trials.filter(t=>!t.isSwitch&&trials.indexOf(t)>0&&t.correct).map(t=>t.rt);
  state.stageB.taskSwitching.switchCost=sw.length&&rp.length?round(median(sw)-median(rp),0):0;
  let pers=0;
  for(let i=1;i<trials.length;i++){
    if(!trials[i].correct&&trials[i].isSwitch)pers++;
  }
  state.stageB.taskSwitching.perseverations=pers;
  render('pulse-intro');
}

AFTER_RENDER['pulse-intro']=()=>{
  let demoRunning=true;
  const seq=[{target:false,shape:'\u25cb'},{target:true,shape:'\u2733'},{target:false,shape:'\u25b3'},{target:true,shape:'\u2733'},{target:false,shape:'\u25a1'}];
  let si=0;
  function demoFlash(){
    if(!demoRunning)return;
    const sym=$('#pd-symbol'),fb=$('#pd-feedback');
    if(!sym)return;
    const s=seq[si%seq.length];
    sym.style.opacity='1';
    sym.innerHTML=s.target?`<span style="color:var(--accent);text-shadow:0 0 16px rgba(209,64,156,.4)">${s.shape}</span>`:`<span style="color:#ccc">${s.shape}</span>`;
    if(fb)fb.textContent='';
    setTimeout(()=>{
      if(!demoRunning)return;
      if(s.target){
        if(fb){fb.textContent='\u2713 \u05DC\u05D7\u05E6\u05D9!';fb.style.color='var(--cyan)'}
      } else {
        if(fb){fb.textContent='\u2014 \u05D4\u05EA\u05E2\u05DC\u05DE\u05D9';fb.style.color='var(--text-muted)'}
      }
      setTimeout(()=>{
        if(!demoRunning)return;
        sym.style.opacity='0';
        si++;
        setTimeout(()=>{if(demoRunning)demoFlash()},300);
      },600);
    },500);
  }
  setTimeout(()=>demoFlash(),500);
  window._cleanupDemo=()=>{demoRunning=false};
};

let _sa={};

function startPulse(){
  const total=24;const trials=[];
  for(let i=0;i<total;i++){
    const isTarget=Math.random()<0.28;
    trials.push({isTarget,responded:false,rt:0,correct:null});
  }
  let tc=trials.filter(t=>t.isTarget).length;
  while(tc<6){const i=randInt(0,total-1);if(!trials[i].isTarget){trials[i].isTarget=true;tc++}}
  _sa={trials,current:0,showTime:0,timeout:null,responded:false};
  render('pulse-active');
}

  </div>
