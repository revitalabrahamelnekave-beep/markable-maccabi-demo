<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
<title>SENSE - דגימת חושים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#D1409C;--accent-dark:#b8357f;--accent-light:#f5e0ee;--accent-bg:#fdf5fa;
  --navy:#1a1a2e;--navy-light:#2a2a4e;
  --text:#1a1a1a;--text-secondary:#555;--text-muted:#888;
  --bg:#ffffff;--bg-off:#f8f8fa;--border:#e4e4e8;--border-light:#eeeeef;
  --cyan:#3a9e95;--amber:#c48a2c;--coral:#c45a4a;
  --gradient:linear-gradient(135deg,#D1409C 0%,#9b2e8e 55%,#7b26a2 100%);
  --radius:14px;--radius-sm:10px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.03),0 2px 8px rgba(0,0,0,.04);
  --shadow-md:0 2px 8px rgba(0,0,0,.04),0 8px 28px rgba(0,0,0,.06);
  --font:'Heebo','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{
  font-family:var(--font);background:#f2f2f7;color:var(--text);
  min-height:100vh;min-height:100dvh;overflow-x:hidden;line-height:1.6;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  display:flex;justify-content:center;align-items:stretch;
}
#app{
  width:390px;max-width:100%;min-height:100vh;min-height:100dvh;
  margin:0 auto;background:var(--bg);
  display:flex;flex-direction:column;position:relative;
  box-shadow:0 0 40px rgba(0,0,0,.08);
}

/* Nav */
.nav{
  position:sticky;top:0;z-index:100;flex-shrink:0;
  background:rgba(255,255,255,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  padding:0 16px;height:44px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border-light);
}
.nav-logo{display:none}
.nav-logo svg{height:20px;width:auto}
.nav-step{font-size:11px;color:var(--text-muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase}

/* Screen */
.screen{
  flex:1;display:flex;flex-direction:column;padding:14px 16px 18px;
  animation:fadeIn .35s cubic-bezier(.25,.46,.45,.94);
  overflow-y:auto;overflow-x:hidden;min-height:0;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;-ms-overflow-style:none;
}
.screen::-webkit-scrollbar{display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

/* Cards */
.card{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 18px;margin-bottom:10px;box-shadow:var(--shadow-sm);
}
.card-accent{border-color:var(--accent-light);background:var(--accent-bg);box-shadow:0 1px 4px rgba(209,64,156,.04),0 4px 16px rgba(209,64,156,.03)}
.card-cyan{border-color:#b8e8e3;background:#f0faf9}

/* Typography */
.eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:3.5px;color:var(--accent);margin-bottom:16px}
h1{font-size:28px;font-weight:800;line-height:1.15;letter-spacing:-.4px;color:var(--navy);margin-bottom:8px}
h2{font-size:20px;font-weight:700;line-height:1.25;color:var(--navy);margin-bottom:8px}
h3{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:6px}
.subtitle{font-size:13px;color:var(--text-secondary);line-height:1.55;margin-bottom:14px}
.label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2.2px;color:var(--text-muted);margin-bottom:8px}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border:none;border-radius:var(--radius-sm);font-family:var(--font);
  font-size:15px;font-weight:600;cursor:pointer;transition:all .2s ease;
  min-height:46px;padding:12px 24px;width:100%;
  -webkit-user-select:none;user-select:none;
}
.btn-primary{
  background:var(--gradient);color:#fff;
  box-shadow:0 2px 8px rgba(209,64,156,.18),0 6px 20px rgba(209,64,156,.12);
  position:relative;overflow:hidden;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(209,64,156,.22),0 10px 28px rgba(209,64,156,.18)}
.btn-primary:active{transform:translateY(0) scale(.98);box-shadow:0 2px 6px rgba(209,64,156,.15);transition-duration:.1s}
.btn-secondary{background:var(--bg-off);color:var(--text);border:1.5px solid var(--border);box-shadow:var(--shadow-sm)}
.btn-secondary:hover{border-color:#d0d0d4;background:#f4f4f6}
.btn-secondary:active{transform:scale(.98)}
.btn-ghost{background:transparent;color:var(--text-muted);min-height:40px;padding:8px 16px;font-size:13px}
.btn-ghost:hover{color:var(--text-secondary);background:rgba(0,0,0,.02)}
.btn:disabled{opacity:.35;pointer-events:none}

/* Chips */
.chip{
  display:inline-flex;align-items:center;padding:5px 12px;
  background:var(--accent-bg);border:1px solid var(--accent-light);
  border-radius:20px;font-size:12px;color:var(--accent-dark);font-weight:500;
  letter-spacing:.2px;
}

/* Progress bar */
.progress-wrap{height:4px;background:var(--border-light);border-radius:2px;margin-top:auto;overflow:hidden}
.progress-fill{height:100%;background:var(--gradient);border-radius:2px;transition:width .3s ease}

/* Overall journey progress */
.journey-bar{display:flex;gap:4px;margin-bottom:16px}
.journey-seg{flex:1;height:3px;border-radius:2px;background:var(--border-light)}
.journey-seg.done{background:var(--accent)}
.journey-seg.active{background:var(--accent);opacity:.5}

/* Intro meta row */
.meta-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.meta-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary)}
.meta-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center}
.meta-icon svg{width:16px;height:16px}
.chip-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}

/* Canvas wrapper */
.canvas-wrap{display:flex;justify-content:center;align-items:center;margin:10px 0}
.canvas-wrap canvas{border-radius:var(--radius-sm);border:1px solid var(--border-light)}

/* Direction buttons (diamond layout) */
.dir-diamond{display:grid;grid-template-columns:60px 60px 60px;grid-template-rows:60px 60px 60px;gap:4px;justify-content:center;align-items:center;margin:12px auto;direction:ltr}
.dir-btn{
  width:56px;height:56px;border:2px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s ease;-webkit-user-select:none;user-select:none;
  touch-action:manipulation;
}
.dir-btn:active{transform:scale(.92);background:var(--accent-bg);border-color:var(--accent)}
.dir-btn.correct-flash{background:#e6f9e8;border-color:var(--cyan)}
.dir-btn.wrong-flash{background:#fce8e6;border-color:var(--coral)}
.dir-btn svg{width:20px;height:20px}
.dir-up{grid-column:2;grid-row:1}
.dir-left{grid-column:1;grid-row:2}
.dir-right{grid-column:3;grid-row:2}
.dir-down{grid-column:2;grid-row:3}

/* Sound intervals */
.intervals-row{display:flex;gap:16px;justify-content:center;margin:16px 0}
.interval-circle{
  width:56px;height:56px;border-radius:50%;border:3px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:var(--text-secondary);
  transition:all .25s ease;background:var(--bg);
}
.interval-circle.playing{
  border-color:var(--accent);background:var(--accent-bg);color:var(--accent);
  box-shadow:0 0 16px rgba(209,64,156,.2);
  animation:intervalPulse .4s ease infinite alternate;
}
.interval-circle.correct-flash{background:var(--cyan) !important;border-color:var(--cyan) !important;color:#fff !important;transform:scale(1.15);box-shadow:0 0 16px rgba(58,158,149,.5);transition:all .15s ease}
.interval-circle.wrong-flash{background:var(--coral) !important;border-color:var(--coral) !important;color:#fff !important;transform:scale(0.9);box-shadow:0 0 12px rgba(196,90,74,.4);transition:all .15s ease}
@keyframes intervalPulse{from{transform:scale(1)}to{transform:scale(1.06)}}

.response-btns{display:flex;gap:12px;justify-content:center;margin:16px 0}
.resp-btn{
  width:64px;height:52px;border:2px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg);cursor:pointer;font-size:18px;font-weight:700;color:var(--text);
  font-family:var(--font);transition:all .15s ease;
  -webkit-user-select:none;user-select:none;touch-action:manipulation;
}
.resp-btn:active{transform:scale(.92);background:var(--accent-bg);border-color:var(--accent)}
.resp-btn:disabled{opacity:.3;pointer-events:none}

/* Dichotic ear buttons */
.ear-btns{display:flex;gap:16px;justify-content:center;margin:20px 0}
.ear-btn{
  flex:1;max-width:140px;min-height:56px;border:2px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg);cursor:pointer;font-size:15px;font-weight:600;color:var(--text);
  font-family:var(--font);transition:all .15s ease;
  -webkit-user-select:none;user-select:none;touch-action:manipulation;
}
.ear-btn:active{transform:scale(.95);background:var(--accent-bg);border-color:var(--accent)}

/* Status text */
.status-text{text-align:center;font-size:14px;color:var(--text-secondary);min-height:24px;margin:8px 0}

/* Result gauge */
.gauge{height:10px;border-radius:5px;background:var(--border-light);overflow:hidden;position:relative;margin:10px 0 6px}
.gauge-fill{height:100%;border-radius:5px;transition:width .6s ease}
.gauge-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted)}

/* Composite arc */
.composite-wrap{display:flex;justify-content:center;margin:0}
.composite-circle{position:relative}
.composite-circle svg{width:100%;height:100%}
.composite-score{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.composite-score .value{font-size:30px;font-weight:800;color:var(--navy);line-height:1}
.composite-score .label-text{font-size:11px;color:var(--text-muted);margin-top:4px;text-transform:uppercase;letter-spacing:1px}

/* Result cards */
.result-card{margin-bottom:12px}
.result-value{font-size:24px;font-weight:800;color:var(--navy);margin:4px 0}
.result-interp{font-size:13px;color:var(--text-secondary);line-height:1.6;margin-top:8px}
.result-detail{font-size:11px;color:var(--text-muted);margin-top:6px}

/* Trend arrow */
.trend{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:2px 8px;border-radius:12px}
.trend-up{color:var(--cyan);background:#e6f9f5}
.trend-down{color:var(--coral);background:#fce8e6}
.trend-same{color:var(--amber);background:#fdf3e2}

/* Brightness illustration */
.brightness-illust{display:flex;flex-direction:column;align-items:center;gap:6px;margin:14px 0}
.phone-rect{width:60px;height:100px;border:3px solid var(--navy);border-radius:10px;position:relative;background:#fafafa}
.phone-rect::after{content:'';position:absolute;top:6px;left:6px;right:6px;bottom:6px;background:var(--gradient);border-radius:4px;opacity:.15}
.phone-notch{width:20px;height:4px;background:var(--navy);border-radius:2px;position:absolute;top:4px;left:50%;transform:translateX(-50%)}
.distance-arrow{display:flex;align-items:center;gap:4px;color:var(--text-secondary);font-size:12px;font-weight:500;margin-top:8px}
.distance-line{width:80px;height:2px;background:var(--text-muted);position:relative}
.distance-line::before,.distance-line::after{content:'';position:absolute;top:-3px;width:2px;height:8px;background:var(--text-muted)}
.distance-line::before{left:0}
.distance-line::after{right:0}

/* Disclaimer */
.disclaimer{font-size:10px;color:var(--text-muted);line-height:1.55;margin-top:12px;padding-top:10px;border-top:1px solid var(--border-light)}

/* Headphones check */
.headphones-icon{width:48px;height:48px;margin:0 auto 10px}
.checklist{list-style:none;margin:10px 0}
.checklist li{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:13px;color:var(--text-secondary);line-height:1.45}
.check-bullet{width:20px;height:20px;min-width:20px;border-radius:50%;background:var(--accent-bg);border:1.5px solid var(--accent-light);display:flex;align-items:center;justify-content:center;margin-top:1px}
.check-bullet svg{width:12px;height:12px}

/* Trial counter */
.trial-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.trial-label{font-size:13px;font-weight:600;color:var(--navy)}
.trial-count{font-size:12px;color:var(--text-muted);font-weight:500;font-variant-numeric:tabular-nums}

/* Done badge */
.done-badge{
  width:48px;height:48px;border-radius:50%;background:var(--accent-bg);border:2px solid var(--accent);
  display:flex;align-items:center;justify-content:center;margin:0 auto 10px;
}
.done-badge svg{width:28px;height:28px;color:var(--accent)}

/* Previous session comparison */
.comparison-row{display:flex;gap:12px;margin:8px 0}
.comparison-item{flex:1;padding:10px;border-radius:var(--radius-sm);background:var(--bg-off);border:1px solid var(--border-light);text-align:center}
.comparison-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.comparison-value{font-size:16px;font-weight:700;color:var(--navy)}

/* Understanding section */
.understand-item{padding:12px 0;border-bottom:1px solid var(--border-light)}
.understand-item:last-child{border-bottom:none}
.understand-q{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:4px}
.understand-a{font-size:13px;color:var(--text-secondary);line-height:1.6}

/* Expandable */
.expandable-toggle{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--accent);cursor:pointer;background:none;border:none;padding:8px 0;font-family:var(--font)}
.expandable-toggle svg{width:14px;height:14px;transition:transform .2s}
.expandable-toggle.open svg{transform:rotate(90deg)}
.expandable-content{display:none;font-size:13px;color:var(--text-secondary);line-height:1.65;padding:8px 0 16px}
.expandable-content.show{display:block}

/* Color discrimination */
.color-circles-row{display:flex;gap:16px;justify-content:center;align-items:center;margin:16px 0}
.color-circle{border-radius:50%;cursor:pointer;transition:all .15s ease;border:3px solid transparent}
.color-circle:hover{transform:scale(1.05)}
.color-circle:active{transform:scale(.95)}
.color-circle.selected{border-color:var(--navy);box-shadow:0 0 0 3px rgba(26,26,46,.15)}
.color-surround{background:#808080;border-radius:var(--radius);padding:20px 16px;display:flex;justify-content:center;align-items:center;gap:16px}

/* Flicker */
.flicker-area{display:flex;justify-content:center;align-items:center;margin:20px 0}
.flicker-circle{width:80px;height:80px;border-radius:50%;background:var(--accent);transition:none}
.flicker-btns{display:flex;gap:12px;justify-content:center;margin:20px 0}
.flicker-btn{
  flex:1;max-width:160px;min-height:52px;border:2px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg);cursor:pointer;font-size:14px;font-weight:600;color:var(--text);
  font-family:var(--font);transition:all .15s ease;
  -webkit-user-select:none;user-select:none;touch-action:manipulation;
}
.flicker-btn:active{transform:scale(.95);background:var(--accent-bg);border-color:var(--accent)}
</style>
</head>

    if (e.key >= '0' && e.key <= '3') { e.preventDefault(); answerAM(parseInt(e.key)); }
  }
  // Color test: 1/2/3 keys
  if (currentScreen === 'color' && COLOR.responding) {
    if (e.key >= '1' && e.key <= '3') { e.preventDefault(); answerColor(parseInt(e.key)); }
    if (e.key === '0') { e.preventDefault(); answerColor(0); }
  }
  // Dichotic test: left/right arrow keys
  if (currentScreen === 'dichotic' && DICH.responding) {
    if (e.key === 'ArrowLeft') { e.preventDefault(); answerDich('left'); }
    if (e.key === 'ArrowRight') { e.preventDefault(); answerDich('right'); }
  }
});

  for (var i = 0; i < total; i++) {

    else if (i === testIdx) html += '<div class="journey-seg active"></div>';
    else html += '<div class="journey-seg"></div>';
  }
  html += '</div>';
  return html;
}

// Response countdown - shows seconds remaining and auto-answers when done
function startResponseCountdown(statusId, seconds, autoAnswer) {
  var remaining = seconds;
  var el = document.getElementById(statusId);
  if (el) { el.textContent = 'בחרי עכשיו (' + remaining + 'ש)'; el.style.color = ''; }
  var interval = setInterval(function() {
    remaining--;
    if (el) {
      el.textContent = remaining > 0 ? 'בחרי עכשיו (' + remaining + 'ש)' : 'נגמר הזמן';
      if (remaining <= 3) el.style.color = 'var(--coral)';
    }
    if (remaining <= 0) {
      clearInterval(interval);
      autoAnswer();
    }
  }, 1000);
  return interval;
}

// SCREEN 3: CONTRAST SENSITIVITY TEST (Landolt C)
// ============================
function resetCS() {
  CS.logCS = 1.5;
  CS.step = 0.15;
  CS.consecutiveCorrect = 0;
  CS.reversals = [];
  CS.lastDirection = null;
  CS.trials = [];
  CS.trialNum = 0;
  CS.currentGap = null;
}

function drawLandoltC(canvas, gapDirection, opacity) {
  var dpr = window.devicePixelRatio || 1;
  var displaySize = 200;
  canvas.style.width = displaySize + 'px';
  canvas.style.height = displaySize + 'px';
  canvas.width = displaySize * dpr;
  canvas.height = displaySize * dpr;

  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, displaySize, displaySize);

  var cx = displaySize / 2;
  var cy = displaySize / 2;
  var size = 24;
  var radius = size / 2;
  var strokeWidth = size * 0.2;
  var gapAngle = Math.PI / 4;

  var dirAngles = { right: 0, down: Math.PI / 2, left: Math.PI, up: 3 * Math.PI / 2 };
  var gapCenter = dirAngles[gapDirection];

  ctx.beginPath();
  ctx.arc(cx, cy, radius - strokeWidth / 2, gapCenter + gapAngle / 2, gapCenter - gapAngle / 2 + 2 * Math.PI);
  ctx.strokeStyle = 'rgba(0,0,0,' + opacity + ')';
  ctx.lineWidth = strokeWidth;
  ctx.lineCap = 'round';
  ctx.stroke();
}

function getCSOpacity() {
  return Math.pow(10, -CS.logCS);
}

function getRandomDirection() {
  var dirs = ['up', 'right', 'down', 'left'];
  return dirs[Math.floor(Math.random() * dirs.length)];
}

function startContrastTest() {
  resetCS();
  testActive = true;
  state.currentTestIndex = 0;
  showContrastTrial();
}

function showContrastTrial() {
  if (!testActive) return;

  if (CS.reversals.length >= CS.reversalsForEnd || CS.trialNum >= CS.maxTrials) {
    finishContrastTest();
    return;
  }

  CS.currentGap = getRandomDirection();
  var opacity = getCSOpacity();
  var progress = Math.min(CS.trialNum / CS.maxTrials, CS.reversals.length / CS.reversalsForEnd) * 100;

  render('contrast', '<div style="display:flex;flex-direction:column;flex:1">' +
    journeyProgress(0) +
    '<div class="trial-header"><span class="trial-label">רגישות לניגודיות</span><span class="trial-count">ניסיון ' + (CS.trialNum + 1) + '</span></div>' +
    '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">' +
      '<p style="text-align:center;font-size:15px;color:var(--text-secondary);margin-bottom:4px;font-weight:500">לאיזה כיוון הפתח?</p>' +
      '<p style="text-align:center;font-size:11px;color:var(--text-muted);margin-bottom:4px">החזיקי במרחק זרוע</p>' +
      (isDesktop() ? '<p style="text-align:center;font-size:11px;color:var(--accent);margin-bottom:16px">ניתן להשתמש בחיצי המקלדת</p>' : '<p style="margin-bottom:16px"></p>') +
      '<div class="canvas-wrap" style="margin:0 0 20px"><canvas id="csCanvas"></canvas></div>' +
      '<div class="dir-diamond">' +
        '<button class="dir-btn dir-up" onclick="answerCS(\'up\')" aria-label="למעלה">' + ICONS.arrowUp + '</button>' +
        '<button class="dir-btn dir-left" onclick="answerCS(\'left\')" aria-label="שמאלה">' + ICONS.arrowLeft + '</button>' +
        '<button class="dir-btn dir-right" onclick="answerCS(\'right\')" aria-label="ימינה">' + ICONS.arrowRight + '</button>' +
        '<button class="dir-btn dir-down" onclick="answerCS(\'down\')" aria-label="למטה">' + ICONS.arrowDown + '</button>' +
      '</div>' +
    '</div>' +
    '<div><div class="progress-wrap"><div class="progress-fill" style="width:' + progress + '%"></div></div>' +
    '<div style="text-align:center;margin-top:10px"><button class="btn btn-ghost" onclick="skipTest(\'contrast\')">דלגי על בדיקה זו</button></div></div>' +
  '</div>');

  AFTER_RENDER['contrast'] = function() {
    var canvas = document.getElementById('csCanvas');
    if (canvas) drawLandoltC(canvas, CS.currentGap, opacity);
  };
  AFTER_RENDER['contrast']();
}

function answerCS(direction) {
  if (!testActive) return;
  var correct = direction === CS.currentGap;

  CS.trials.push({ trial: CS.trialNum, logCS: CS.logCS, gap: CS.currentGap, response: direction, correct: correct });

  var btn = document.querySelector('.dir-' + direction);
  if (btn) btn.classList.add(correct ? 'correct-flash' : 'wrong-flash');

  if (correct) {
    CS.consecutiveCorrect++;
    if (CS.consecutiveCorrect >= 2) {
      var newDir = 'up';
      if (CS.lastDirection === 'down') CS.reversals.push(CS.logCS);
      CS.lastDirection = newDir;
      CS.logCS = Math.min(CS.logCS + CS.step, CS.maxLogCS);
      CS.consecutiveCorrect = 0;
    }
  } else {
    CS.consecutiveCorrect = 0;
    var newDir2 = 'down';
    if (CS.lastDirection === 'up') CS.reversals.push(CS.logCS);
    CS.lastDirection = newDir2;
    CS.logCS = Math.max(CS.logCS - CS.step, CS.minLogCS);
  }

  CS.trialNum++;
  setTimeout(showContrastTrial, 200);
}

function finishContrastTest() {
  var threshold;
  if (CS.reversals.length >= 4) {
    var last4 = CS.reversals.slice(-4);
    threshold = last4.reduce(function(a, b) { return a + b; }, 0) / last4.length;
  } else if (CS.reversals.length > 0) {
    threshold = CS.reversals.reduce(function(a, b) { return a + b; }, 0) / CS.reversals.length;
  } else {
    threshold = CS.logCS;
  }
  state.csResult = { logCS: Math.round(threshold * 100) / 100, trials: CS.trialNum, reversals: CS.reversals.length };
  testActive = false;
  showTransition('\u05E0\u05D9\u05D2\u05D5\u05D3\u05D9\u05D5\u05EA \u05E0\u05E7\u05DC\u05D8\u05D4!', '\u05E6\u05D9\u05D5\u05DF: ' + state.csResult.logCS, showColorDemo);
}

function skipTest(name) {
  testActive = false;
  if (FLICKER.animFrame) { cancelAnimationFrame(FLICKER.animFrame); FLICKER.animFrame = null; }
  if (name === 'contrast') { state.csResult = null; showColorDemo(); }
  else if (name === 'color') { state.colorResult = null; showHeadphones(); }
  else if (name === 'flicker') { state.flickerResult = null; showHeadphones(); }
  else if (name === 'toneNoise') { state.tinResult = null; showGapDemo(); }
  else if (name === 'gap') { state.gapResult = null; showAMDemo(); }
  else if (name === 'am') { state.amResult = null; checkDichotic(); }
  else if (name === 'dichotic') { state.dichoticResult = null; showResults(); }
}

function startColorTest() {
  resetCOLOR();
  testActive = true;
  state.currentTestIndex = 1;
  runColorTrial();
}

function runColorTrial() {
  if (!testActive) return;

  // Check if current phase is done
  if (COLOR.trialNum >= COLOR.maxTrials) {
    // Save threshold for this phase
    var threshold = computeColorThreshold();
    if (COLOR.phase === 'blue') {
      COLOR.blueThreshold = threshold;
      // Switch to red
      COLOR.phase = 'red';
      COLOR.baseHue = 0;
      COLOR.deltaHue = 8;
      COLOR.consecutiveCorrect = 0;
      COLOR.reversals = [];
      COLOR.lastDirection = null;
      COLOR.trials = [];
      COLOR.trialNum = 0;
      runColorTrial();
      return;
    } else {
      COLOR.redThreshold = threshold;
      finishColorTest();
      return;
    }
  }

  // Pick target interval (1, 2, or 3)
  COLOR.targetInterval = Math.floor(Math.random() * 3) + 1;
  COLOR.responding = false;

  var phaseLabel = COLOR.phase === 'blue' ? 'אבחנת כחול' : 'אבחנת אדום';
  var phaseNum = COLOR.phase === 'blue' ? '\u05D0\u05F3' : '\u05D1\u05F3';
  var totalTrials = COLOR.maxTrials;
  var progress = COLOR.trialNum / totalTrials * 100;

  // Build color circles
  var base = COLOR.baseHue;
  var delta = COLOR.deltaHue;
  // Randomly add or subtract delta for target
  var sign = Math.random() < 0.5 ? 1 : -1;
  var targetHue = base + delta * sign;
  COLOR._targetSign = sign;

  var circles = '';
  for (var i = 1; i <= 3; i++) {
    var hue = (i === COLOR.targetInterval) ? targetHue : base;
    circles += '<div class="color-circle" style="width:70px;height:70px;background:hsl(' + hue + ',80%,50%);cursor:pointer" onclick="answerColor(' + i + ')" id="cc-' + i + '"></div>';
  }

  render('color', '<div style="display:flex;flex-direction:column;flex:1">' +
    journeyProgress(1) +
    '<div class="trial-header"><span class="trial-label">' + phaseLabel + ' (שלב ' + phaseNum + ')</span><span class="trial-count">ניסיון ' + (COLOR.trialNum + 1) + ' מתוך ' + totalTrials + '</span></div>' +

      (isDesktop() ? '<p style="text-align:center;font-size:11px;color:var(--accent);margin:0 0 12px">מקלדת: 1 / 2 / 3</p>' : '<p style="margin:0 0 12px"></p>') +
      '<div class="response-btns" id="color-resp">' +
        '<button class="resp-btn" onclick="answerColor(1)">1</button>' +
        '<button class="resp-btn" onclick="answerColor(2)">2</button>' +
        '<button class="resp-btn" onclick="answerColor(3)">3</button>' +
      '</div>' +
      '<div style="text-align:center;margin-top:4px"><button class="btn btn-ghost" style="font-size:12px;min-height:36px;color:var(--coral)" onclick="answerColor(0)">לא הצלחתי לזהות</button></div>' +
    '</div>' +
    '<div><div class="progress-wrap"><div class="progress-fill" style="width:' + progress + '%"></div></div>' +
    '<div style="text-align:center;margin-top:10px"><button class="btn btn-ghost" onclick="skipTest(\'color\')">דלגי על בדיקה זו</button></div></div>' +
  '</div>');

  COLOR.responding = true;
}

function answerColor(choice) {
  if (!COLOR.responding) return;
  COLOR.responding = false;

  var didntSee = (choice === 0);
  var correct = (!didntSee && choice === COLOR.targetInterval);

  // Flash feedback on circles
  if (choice >= 1 && choice <= 3) {
    var el = document.getElementById('cc-' + choice);
    if (el) el.style.border = correct ? '3px solid var(--cyan)' : '3px solid var(--coral)';
  }
  if (!correct) {
    var tgt = document.getElementById('cc-' + COLOR.targetInterval);
    if (tgt) tgt.style.border = '3px solid var(--cyan)';
  }

  COLOR.trials.push({ trial: COLOR.trialNum, phase: COLOR.phase, deltaHue: COLOR.deltaHue, target: COLOR.targetInterval, response: choice, correct: correct, didntSee: didntSee });

  // 2-down-1-up adaptive
  if (correct) {
    COLOR.consecutiveCorrect++;
    if (COLOR.consecutiveCorrect >= 2) {
      var nDir = 'down';
      if (COLOR.lastDirection === 'up') COLOR.reversals.push(COLOR.deltaHue);
      COLOR.lastDirection = nDir;
      COLOR.deltaHue = Math.max(COLOR.deltaHue / COLOR.stepFactor, COLOR.minDelta);
      COLOR.consecutiveCorrect = 0;
    }
  } else {
    COLOR.consecutiveCorrect = 0;
    var nDir2 = 'up';
    if (COLOR.lastDirection === 'down') COLOR.reversals.push(COLOR.deltaHue);
    COLOR.lastDirection = nDir2;
    COLOR.deltaHue = Math.min(COLOR.deltaHue * COLOR.stepFactor, COLOR.maxDelta);
  }

  COLOR.trialNum++;
  setTimeout(runColorTrial, 400);
}

function computeColorThreshold() {
  if (COLOR.reversals.length >= 4) {
    var last4 = COLOR.reversals.slice(-4);
    return last4.reduce(function(a, b) { return a + b; }, 0) / last4.length;
  } else if (COLOR.reversals.length > 0) {
    return COLOR.reversals.reduce(function(a, b) { return a + b; }, 0) / COLOR.reversals.length;
  }
  return COLOR.deltaHue;
}

function finishColorTest() {
  var bdi = COLOR.redThreshold > 0 ? Math.round((COLOR.blueThreshold / COLOR.redThreshold) * 100) / 100 : 1.0;
  state.colorResult = {
    bdi: bdi,
    blueThreshold: Math.round(COLOR.blueThreshold * 10) / 10,
    redThreshold: Math.round(COLOR.redThreshold * 10) / 10,
    blueTrials: COLOR.maxTrials,
    redTrials: COLOR.maxTrials
  };
  testActive = false;
  showTransition('\u05E6\u05D1\u05E2 \u05E0\u05E7\u05DC\u05D8!', '\u05E6\u05D9\u05D5\u05DF: ' + state.colorResult.bdi, showHeadphones);
}

function startFlickerAnimation(elementId, freq) {
  stopFlickerAnimation();
  var circle = document.getElementById(elementId);
  if (!circle) return;
  var startTime = performance.now();

  function animate(now) {
    var elapsed = (now - startTime) / 1000;
    // Sinusoidal modulation: opacity oscillates between 0.15 and 1.0
    var phase = Math.sin(2 * Math.PI * freq * elapsed);
    var opacity = 0.575 + 0.425 * phase;
    circle.style.opacity = opacity;
    FLICKER.animFrame = requestAnimationFrame(animate);
  }
  FLICKER.animFrame = requestAnimationFrame(animate);
}

function stopFlickerAnimation() {
  if (FLICKER.animFrame) {
    cancelAnimationFrame(FLICKER.animFrame);
    FLICKER.animFrame = null;
  }
}

function startFlickerTest() {
  resetFLICKER();
  testActive = true;
  state.currentTestIndex = 2;
  runFlickerRun();
}

function runFlickerRun() {
  if (!testActive) return;

  if (FLICKER.runNum >= FLICKER.maxRuns) {
    finishFlickerTest();
    return;
  }

  // Start frequency: random between 3-8 Hz for runs after the first
  if (FLICKER.runNum > 0) {
    FLICKER.frequency = FLICKER.minFreq + Math.floor(Math.random() * 6);
  } else {
    FLICKER.frequency = 5;
  }

  showFlickerTrial();
}

function showFlickerTrial() {
  if (!testActive) return;

  // If frequency exceeds max, record threshold as maxFreq
  if (FLICKER.frequency > FLICKER.maxFreq) {
    FLICKER.runThresholds.push(FLICKER.maxFreq);
    FLICKER.runNum++;
    setTimeout(runFlickerRun, 800);
    return;
  }

  var runLabel = 'סבב ' + (FLICKER.runNum + 1) + ' מתוך ' + FLICKER.maxRuns;
  var progress = (FLICKER.runNum / FLICKER.maxRuns) * 100;

  render('flicker', '<div style="display:flex;flex-direction:column;flex:1">' +
    journeyProgress(2) +
    '<div class="trial-header"><span class="trial-label">רגישות להבהוב</span><span class="trial-count">' + runLabel + '</span></div>' +
    '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">' +
      '<p style="text-align:center;font-size:13px;color:var(--text-muted);margin-bottom:4px">מה את רואה עכשיו?</p>' +
      (isDesktop() ? '<p style="text-align:center;font-size:11px;color:var(--accent);margin-bottom:16px">מקלדת: 1 = מהבהב, 2 = נראה יציב</p>' : '<p style="margin-bottom:16px"></p>') +
      '<div class="flicker-area"><div id="flicker-test-circle" class="flicker-circle"></div></div>' +
      '<div class="status-text" id="flicker-status" style="margin:16px 0 20px">הסתכלי על העיגול</div>' +
      '<div style="display:flex;gap:12px;width:100%">' +
        '<button class="btn btn-secondary" style="flex:1;min-height:56px;font-size:14px" onclick="answerFlicker(\'flickering\')">מהבהב</button>' +
        '<button class="btn btn-primary" style="flex:1;min-height:56px;font-size:14px" onclick="answerFlicker(\'steady\')">נראה יציב</button>' +
      '</div>' +
    '</div>' +
    '<div><div class="progress-wrap"><div class="progress-fill" style="width:' + progress + '%"></div></div>' +
    '<div style="text-align:center;margin-top:10px"><button class="btn btn-ghost" onclick="skipTest(\'flicker\')">דלגי על בדיקה זו</button></div></div>' +
  '</div>');

  AFTER_RENDER['flicker'] = function() {
    startFlickerAnimation('flicker-test-circle', FLICKER.frequency);
  };
  AFTER_RENDER['flicker']();
}

function answerFlicker(response) {
  if (!testActive) return;
  stopFlickerAnimation();

  if (response === 'flickering') {
    // Increase frequency
    FLICKER.frequency += FLICKER.step;
    setTimeout(showFlickerTrial, 300);
  } else {
    // "Looks steady" - record threshold
    FLICKER.runThresholds.push(FLICKER.frequency);
    FLICKER.runNum++;
    if (FLICKER.runNum >= FLICKER.maxRuns) {
      finishFlickerTest();
    } else {
      // Brief pause between runs
      var circle = document.getElementById('flicker-test-circle');
      if (circle) circle.style.opacity = '1';
      var status = document.getElementById('flicker-status');
      if (status) status.textContent = 'סבב הושלם. מתחילות סבב הבא...';
      setTimeout(runFlickerRun, 1200);
    }
  }
}

function finishFlickerTest() {
  stopFlickerAnimation();
  var avg = 0;
  if (FLICKER.runThresholds.length > 0) {
    avg = FLICKER.runThresholds.reduce(function(a, b) { return a + b; }, 0) / FLICKER.runThresholds.length;
  }
  state.flickerResult = { cff: Math.round(avg * 10) / 10, runs: FLICKER.runThresholds.length };
  testActive = false;
  showTransition('\u05D4\u05D1\u05D4\u05D5\u05D1 \u05E0\u05E7\u05DC\u05D8!', '\u05E6\u05D9\u05D5\u05DF: ' + state.flickerResult.cff + ' Hz', showHeadphones);
}

function playThreeIntervalsNoise(ctx, freq, noiseGain, snrDB, targetInterval, onDone, idPrefix) {
  var dur = 0.45;
  var gap = 0.45;
  playSequentialIntervals(function(c, startTime, d, idx) {
    playNoiseInterval(c, freq, d, idx === targetInterval, snrDB, noiseGain, startTime);
  }, dur, gap, idPrefix || 'int-', onDone);
}

function playNoiseInterval(ctx, freq, duration, hasSignal, snrDB, noiseGain, startTime) {
  var bufferSize = Math.ceil(ctx.sampleRate * duration);
  var noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  var data = noiseBuffer.getChannelData(0);
  for (var i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

  var noiseSrc = ctx.createBufferSource();
  noiseSrc.buffer = noiseBuffer;
  var filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = freq;
  filter.Q.value = 4.32;
  var nGain = ctx.createGain();
  nGain.gain.value = noiseGain;
  noiseSrc.connect(filter);
  filter.connect(nGain);
  nGain.connect(ctx.destination);
  noiseSrc.start(startTime);
  noiseSrc.stop(startTime + duration);

  if (hasSignal) {
    var toneStart = duration * 0.15;
    var toneDur = duration * 0.6;
    var ramp = 0.015;
    var toneLevel = noiseGain * Math.pow(10, snrDB / 20);
    var osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;
    var tGain = ctx.createGain();
    tGain.gain.setValueAtTime(0, startTime + toneStart);
    tGain.gain.linearRampToValueAtTime(toneLevel, startTime + toneStart + ramp);
    tGain.gain.setValueAtTime(toneLevel, startTime + toneStart + toneDur - ramp);
    tGain.gain.linearRampToValueAtTime(0, startTime + toneStart + toneDur);
    osc.connect(tGain);
    tGain.connect(ctx.destination);
    osc.start(startTime + toneStart);
    osc.stop(startTime + toneStart + toneDur);
  }
}

// Sequential playback: play one interval at a time with visual sync
function playSequentialIntervals(playFn, dur, gap, prefix, onDone) {
  var current = 0;
  function playNext() {
    if (current >= 3) {
      setTimeout(onDone, 100);
      return;
    }
    var idx = current + 1;
    var el = document.getElementById(prefix + idx);
    if (el) el.classList.add('playing');
    var ctx = ensureAudioContext();
    playFn(ctx, ctx.currentTime + 0.02, dur, idx);
    setTimeout(function() {
      if (el) el.classList.remove('playing');
      current++;
      setTimeout(playNext, gap * 1000);
    }, dur * 1000);
  }
  playNext();
}

function startTINTest() {
  resetTIN();
  testActive = true;
  state.currentTestIndex = 3;
  runTINTrial();
}

function runTINTrial() {
  if (!testActive) return;

  if (TIN.phase === 'primary' && (TIN.reversals.length >= 5 || TIN.trialNum >= TIN.maxTrials)) {
    TIN.phase = 'check';
    TIN.freq = 4000;
    TIN.trialNum = 0;
    TIN.checkCorrect = 0;
  }
  if (TIN.phase === 'check' && TIN.trialNum >= TIN.checkTrials) {
    finishTINTest();
    return;
  }

  var totalTrials = TIN.phase === 'primary' ? TIN.maxTrials : TIN.checkTrials;
  var progress = TIN.phase === 'primary' ? Math.min(TIN.trialNum / TIN.maxTrials, TIN.reversals.length / 5) * 100 : (TIN.trialNum / TIN.checkTrials) * 100;

function answerTIN(choice) {
  if (!TIN.responding) return;
  TIN.responding = false;
  if (TIN._countdown) { clearInterval(TIN._countdown); TIN._countdown = null; }

  var isTimeout = (choice === -1);
  var didntHear = (choice === 0);
  var correct = (!didntHear && !isTimeout && choice === TIN.targetInterval);

  // Only show feedback if user actually chose (not timeout)
  if (!isTimeout) {
    if (choice >= 1 && choice <= 3) {
      var userCircle = document.getElementById('int-' + choice);
      if (userCircle) userCircle.classList.add(correct ? 'correct-flash' : 'wrong-flash');
    }
    setTimeout(function() {
      if (!correct) {
        var correctCircle = document.getElementById('int-' + TIN.targetInterval);
        if (correctCircle) correctCircle.classList.add('correct-flash');
      }
      var status = document.getElementById('tin-status');
      if (status) {
        status.textContent = correct ? 'נכון!' : 'התשובה הייתה ' + TIN.targetInterval;
        status.style.color = correct ? 'var(--cyan)' : 'var(--coral)';
      }
    }, 400);
  } else {
    var status = document.getElementById('tin-status');
    if (status) { status.textContent = 'נגמר הזמן - ממשיכות'; status.style.color = 'var(--text-muted)'; }
  }

  TIN.trials.push({ trial: TIN.trialNum, snr: TIN.snr, target: TIN.targetInterval, response: choice, correct: correct, didntHear: didntHear });

  if (TIN.phase === 'check') {
    if (correct) TIN.checkCorrect++;
    TIN.trialNum++;
    setTimeout(runTINTrial, 2200);
    return;
  }

  var step = TIN.reversals.length >= 3 ? TIN.stepFine : TIN.stepCoarse;
  if (correct) {
    TIN.consecutiveCorrect++;
    if (TIN.consecutiveCorrect >= 2) {
      var nDir = 'down';
      if (TIN.lastDirection === 'up') TIN.reversals.push(TIN.snr);
      TIN.lastDirection = nDir;
      TIN.snr = Math.max(TIN.snr - step, -20);
      TIN.consecutiveCorrect = 0;
    }
  } else {
    TIN.consecutiveCorrect = 0;
    var nDir2 = 'up';
    if (TIN.lastDirection === 'down') TIN.reversals.push(TIN.snr);
    TIN.lastDirection = nDir2;
    TIN.snr = Math.min(TIN.snr + step, 16);
  }

  TIN.trialNum++;
  setTimeout(runTINTrial, 2200);
}

function finishTINTest() {
  var threshold;
  if (TIN.reversals.length >= 4) {
    var last4 = TIN.reversals.slice(-4);
    threshold = last4.reduce(function(a, b) { return a + b; }, 0) / last4.length;
  } else if (TIN.reversals.length > 0) {
    threshold = TIN.reversals.reduce(function(a, b) { return a + b; }, 0) / TIN.reversals.length;
  } else {
    threshold = TIN.snr;
  }
  state.tinResult = { snr: Math.round(threshold * 10) / 10, trials: TIN.trials.length, reversals: TIN.reversals.length, freq: 2000, highFreqPassed: TIN.checkCorrect >= 1 };
  testActive = false;
  showTransition('\u05E9\u05DE\u05D9\u05E2\u05D4 \u05E0\u05E7\u05DC\u05D8\u05D4!', '\u05E6\u05D9\u05D5\u05DF: ' + state.tinResult.snr + ' dB', showGapDemo);
}

function playThreeGapIntervals(ctx, gain, gapMs, targetInterval, onDone, idPrefix) {
  var dur = 0.45;
  var silence = 0.45;
  playSequentialIntervals(function(c, startTime, d, idx) {
    playGapOrNoGap(c, startTime, d, idx === targetInterval ? gapMs : 0, gain);
  }, dur, silence, idPrefix || 'gint-', onDone);
}

function playGapOrNoGap(ctx, startTime, duration, gapMs, gain) {
  var sr = ctx.sampleRate;
  var totalSamples = Math.ceil(sr * duration);
  var buffer = ctx.createBuffer(1, totalSamples, sr);
  var data = buffer.getChannelData(0);

  for (var i = 0; i < totalSamples; i++) data[i] = Math.random() * 2 - 1;

  if (gapMs > 0) {
    var gapSamples = Math.ceil(sr * gapMs / 1000);
    var gapStart = Math.floor(totalSamples / 2 - gapSamples / 2);
    var rampSamples = Math.ceil(sr * 0.001);
    for (var j = gapStart; j < gapStart + gapSamples && j < totalSamples; j++) {
      if (j < gapStart + rampSamples) {
        data[j] *= 0.5 * (1 + Math.cos(Math.PI * (j - gapStart) / rampSamples));
      } else if (j > gapStart + gapSamples - rampSamples) {
        data[j] *= 0.5 * (1 - Math.cos(Math.PI * (j - (gapStart + gapSamples - rampSamples)) / rampSamples));
      } else {
        data[j] = 0;
      }
    }
  }

  var src = ctx.createBufferSource();
  src.buffer = buffer;
  var filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 2000;
  filter.Q.value = 0.5;
  var g = ctx.createGain();
  g.gain.value = gain;
  src.connect(filter);
  filter.connect(g);
  g.connect(ctx.destination);
  src.start(startTime);
  src.stop(startTime + duration);
}

function playAMOrSteady(ctx, startTime, duration, modDB, gain) {
  var sr = ctx.sampleRate;
  var samples = Math.ceil(sr * duration);
  var buffer = ctx.createBuffer(1, samples, sr);
  var data = buffer.getChannelData(0);
  var modDepth = modDB > -50 ? Math.pow(10, modDB / 20) : 0;

  for (var i = 0; i < samples; i++) {
    var t = i / sr;
    var noise = Math.random() * 2 - 1;
    var envelope = 1 + modDepth * Math.sin(2 * Math.PI * 40 * t);
    data[i] = noise * envelope;
  }

  var src = ctx.createBufferSource();
  src.buffer = buffer;
  var filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 2000;
  filter.Q.value = 0.5;
  var g = ctx.createGain();
  g.gain.value = gain;
  src.connect(filter);
  filter.connect(g);
  g.connect(ctx.destination);
  src.start(startTime);
  src.stop(startTime + duration);
}

      if (u) u.style.visibility = 'visible';
      AM.responding = true;
      AM._countdown = startResponseCountdown('am-status', 8, function() {
        if (AM.responding) answerAM(-1);
      });
    }, 'amint-');
  };
  AFTER_RENDER['am']();
}

function answerAM(choice) {
  if (!AM.responding) return;
  AM.responding = false;
  if (AM._countdown) { clearInterval(AM._countdown); AM._countdown = null; }

  var isTimeout = (choice === -1);
  var didntHear = (choice === 0);
  var correct = (!didntHear && !isTimeout && choice === AM.targetInterval);

  if (!isTimeout) {
    if (choice >= 1 && choice <= 3) {
      var userCircle = document.getElementById('amint-' + choice);
      if (userCircle) userCircle.classList.add(correct ? 'correct-flash' : 'wrong-flash');
    }
    setTimeout(function() {
      if (!correct) {
        var correctCircle = document.getElementById('amint-' + AM.targetInterval);
        if (correctCircle) correctCircle.classList.add('correct-flash');
      }
      var status = document.getElementById('am-status');
      if (status) {
        status.textContent = correct ? 'נכון!' : 'התשובה הייתה ' + AM.targetInterval;
        status.style.color = correct ? 'var(--cyan)' : 'var(--coral)';
      }
    }, 400);
  } else {
    var status = document.getElementById('am-status');
    if (status) { status.textContent = 'נגמר הזמן - ממשיכות'; status.style.color = 'var(--text-muted)'; }
  }

  AM.trials.push({ trial: AM.trialNum, modDB: AM.modDB, target: AM.targetInterval, response: choice, correct: correct, didntHear: didntHear });

  var step = AM.reversals.length >= 3 ? AM.stepFine : AM.stepCoarse;
  if (correct) {
    AM.consecutiveCorrect++;
    if (AM.consecutiveCorrect >= 2) {
      var nDir = 'down';
      if (AM.lastDirection === 'up') AM.reversals.push(AM.modDB);
      AM.lastDirection = nDir;
      AM.modDB = Math.max(AM.modDB - step, -24);
      AM.consecutiveCorrect = 0;
    }
  } else {
    AM.consecutiveCorrect = 0;
    var nDir2 = 'up';
    if (AM.lastDirection === 'down') AM.reversals.push(AM.modDB);
    AM.lastDirection = nDir2;
    AM.modDB = Math.min(AM.modDB + step, 0);
  }

  AM.trialNum++;
  setTimeout(runAMTrial, 2200);
}

function finishAMTest() {
  var threshold;
  if (AM.reversals.length >= 4) {
    var last4 = AM.reversals.slice(-4);
    threshold = last4.reduce(function(a, b) { return a + b; }, 0) / last4.length;
  } else if (AM.reversals.length > 0) {
    threshold = AM.reversals.reduce(function(a, b) { return a + b; }, 0) / AM.reversals.length;
  } else {
    threshold = AM.modDB;
  }
  state.amResult = { thresholdDB: Math.round(threshold * 10) / 10, trials: AM.trialNum, reversals: AM.reversals.length };
  testActive = false;
  showTransition('קצב נקלט!', 'סף: ' + state.amResult.thresholdDB + ' dB', checkDichotic);
}

// ============================
// SCREEN 10: DICHOTIC BONUS (headphones only)
// ============================
function checkDichotic() {
  if (state.useHeadphones) {
    showDichoticIntro();
  } else {
    state.dichoticResult = { tested: false };
    showResults();
  }
}

function showDichoticIntro() {
  render('dichoticIntro', '<div style="display:flex;flex-direction:column;flex:1">' +
    '<div style="background:linear-gradient(135deg,#e8f5e9,#f3e8ff);border-radius:var(--radius);padding:20px;margin:8px 0 20px;text-align:center">' +
      '<div style="display:inline-block;background:var(--cyan);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">בונוס</div>' +
      '<h2 style="margin-bottom:8px">האזנה דיכוטית</h2>' +
      '<p style="font-size:13px;color:var(--text-secondary)">בדיקה איך המוח שלך מפריד צלילים בין האוזניים</p>' +
    '</div>' +
    '<p class="subtitle">צליל יושמע באוזן השמאלית בלבד. אשרי באיזו אוזן שמעת.</p>' +
    '<div style="flex:1"></div>' +
    '<button class="btn btn-primary" onclick="runHeadphoneVerify()">השמיעי צליל אימות</button>' +
    '<button class="btn btn-ghost" onclick="skipTest(\'dichotic\')" style="margin-top:8px">דלגי על בדיקת הבונוס</button>' +
  '</div>');
}

function runHeadphoneVerify() {
  var ctx = ensureAudioContext();
  var osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = 1000;
  var g = ctx.createGain();
  g.gain.value = 0.2;
  var merger = ctx.createChannelMerger(2);
  osc.connect(g);
  g.connect(merger, 0, 0);
  var silentGain = ctx.createGain();
  silentGain.gain.value = 0;
  osc.connect(silentGain);
  silentGain.connect(merger, 0, 1);
  merger.connect(ctx.destination);

  var now = ctx.currentTime;
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.2, now + 0.01);
  g.gain.setValueAtTime(0.2, now + 0.3);
  g.gain.linearRampToValueAtTime(0, now + 0.31);
  osc.start(now);
  osc.stop(now + 0.35);

  setTimeout(function() {
    render('dichoticIntro', '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">' +
      '<h3>באיזו אוזן שמעת את הצליל?</h3>' +
      '<div class="ear-btns">' +
        '<button class="ear-btn" onclick="verifyEar(\'left\')">שמאל</button>' +
        '<button class="ear-btn" onclick="verifyEar(\'right\')">ימין</button>' +
      '</div>' +
    '</div>');
  }, 500);
}

function verifyEar(ear) {
  if (ear === 'left') {
    startDichoticTest();
  } else {
    state.dichoticResult = { tested: false, reason: 'headphone_verify_failed' };
    showTransition('בדיקת אוזניות נכשלה', 'מדלגות על בדיקה דיכוטית', showResults);
  }
}

function resetDICH() {
  DICH.trials = [];
  DICH.trialNum = 0;
  DICH.responding = false;
}

function startDichoticTest() {
  resetDICH();
  testActive = true;
  runDichoticTrial();
}

var DICH_FREQS = [500, 750, 1000, 1500, 2000];

function getDichoticPair() {
  var attempts = 0;
  var fL, fR;
  while (attempts < 50) {
    var i1 = Math.floor(Math.random() * DICH_FREQS.length);
    var i2 = Math.floor(Math.random() * DICH_FREQS.length);
    if (i1 === i2) { attempts++; continue; }
    fL = DICH_FREQS[i1];
    fR = DICH_FREQS[i2];
    if (Math.max(fL, fR) / Math.min(fL, fR) >= 2) break;
    attempts++;
  }
  // Ensure half have high-left, half high-right
  if (DICH.trialNum < 6) {
    if (fL < fR) { var tmp = fL; fL = fR; fR = tmp; }
  } else {
    if (fR < fL) { var tmp2 = fL; fL = fR; fR = tmp2; }
  }
  return { left: fL, right: fR };
}

function runDichoticTrial() {
  if (!testActive) return;
  if (DICH.trialNum >= DICH.maxTrials) {
    finishDichoticTest();
    return;
  }

  DICH.responding = false;
  var pair = getDichoticPair();
  DICH._currentPair = pair;

  render('dichotic', '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">' +
    '<div class="trial-header" style="width:100%"><span class="trial-label">האזנה דיכוטית</span><span class="trial-count">ניסיון ' + (DICH.trialNum + 1) + ' מתוך ' + DICH.maxTrials + '</span></div>' +
    '<div class="status-text" id="dich-status">הקשיבי...</div>' +
    '<div class="ear-btns" id="dich-resp" style="visibility:hidden">' +
      '<button class="ear-btn" onclick="answerDich(\'left\')">שמאל</button>' +
      '<button class="ear-btn" onclick="answerDich(\'right\')">ימין</button>' +
    '</div>' +
    '<p style="font-size:12px;color:var(--text-muted);margin-top:16px">באיזו אוזן שמעת את הצליל הגבוה?</p>' +
    (isDesktop() ? '<p style="text-align:center;font-size:11px;color:var(--accent);margin-top:8px">מקלדת: חץ שמאלה / חץ ימינה</p>' : '') +
  '</div>' +
  '<div style="margin-top:auto"><div class="progress-wrap"><div class="progress-fill" style="width:' + (DICH.trialNum / DICH.maxTrials * 100) + '%"></div></div>' +
  '<div style="text-align:center;margin-top:10px"><button class="btn btn-ghost" onclick="skipTest(\'dichotic\')">דלגי</button></div></div>'
  );

  AFTER_RENDER['dichotic'] = function() {
    var ctx = ensureAudioContext();
    playDichotic(ctx, pair.left, pair.right, 0.2, DICH.toneGain);
    setTimeout(function() {
      var s = document.getElementById('dich-status');
      if (s) s.textContent = 'באיזו אוזן שמעת את הצליל הגבוה?';
      var r = document.getElementById('dich-resp');
      if (r) r.style.visibility = 'visible';
      DICH.responding = true;
    }, 400);
  };
  AFTER_RENDER['dichotic']();
}

function playDichotic(ctx, freqL, freqR, duration, gain) {
  var merger = ctx.createChannelMerger(2);
  var ramp = 0.01;
  var now = ctx.currentTime + 0.05;

  var oscL = ctx.createOscillator();
  oscL.type = 'sine';
  oscL.frequency.value = freqL;
  var gL = ctx.createGain();
  gL.gain.setValueAtTime(0, now);
  gL.gain.linearRampToValueAtTime(gain, now + ramp);
  gL.gain.setValueAtTime(gain, now + duration - ramp);
  gL.gain.linearRampToValueAtTime(0, now + duration);
  oscL.connect(gL);
  gL.connect(merger, 0, 0);

  var oscR = ctx.createOscillator();
  oscR.type = 'sine';
  oscR.frequency.value = freqR;
  var gR = ctx.createGain();
  gR.gain.setValueAtTime(0, now);
  gR.gain.linearRampToValueAtTime(gain, now + ramp);
  gR.gain.setValueAtTime(gain, now + duration - ramp);
  gR.gain.linearRampToValueAtTime(0, now + duration);
  oscR.connect(gR);
  gR.connect(merger, 0, 1);

  merger.connect(ctx.destination);
  oscL.start(now);
  oscL.stop(now + duration + 0.01);
  oscR.start(now);
  oscR.stop(now + duration + 0.01);
}

function answerDich(ear) {
  if (!DICH.responding) return;
  DICH.responding = false;

  var pair = DICH._currentPair;
  var higherEar = pair.left > pair.right ? 'left' : 'right';
  var correct = ear === higherEar;

  DICH.trials.push({ trial: DICH.trialNum, freqL: pair.left, freqR: pair.right, higherEar: higherEar, response: ear, correct: correct });
  DICH.trialNum++;
  setTimeout(runDichoticTrial, 1000);
}

function finishDichoticTest() {
  testActive = false;
  var leftCorrect = 0, rightCorrect = 0, leftTotal = 0, rightTotal = 0;
  for (var i = 0; i < DICH.trials.length; i++) {
    var t = DICH.trials[i];
    if (t.higherEar === 'left') {
      leftTotal++;
      if (t.correct) leftCorrect++;
    } else {
      rightTotal++;
      if (t.correct) rightCorrect++;
    }
  }
  var leftAcc = leftTotal > 0 ? Math.round(leftCorrect / leftTotal * 100) : 0;
  var rightAcc = rightTotal > 0 ? Math.round(rightCorrect / rightTotal * 100) : 0;
  var rea = Math.round((rightCorrect - leftCorrect) / DICH.trials.length * 100);

  state.dichoticResult = { tested: true, rea: rea, leftAcc: leftAcc, rightAcc: rightAcc, trials: DICH.trials.length };
  showTransition('האזנה דיכוטית נקלטה!', 'REA: ' + rea + '%', showResults);
}

// ============================
// SCREEN 11: RESULTS REPORT
// ============================
function getCSScore() {
  if (!state.csResult) return null;
  var v = state.csResult.logCS;
  if (v >= 1.65) return { pct: Math.min(100, 50 + (v - 1.65) / 0.45 * 50), label: 'תקין', color: 'var(--cyan)' };
  if (v >= 1.35) return { pct: 35 + (v - 1.35) / 0.3 * 30, label: 'שינויים קלים', color: 'var(--amber)' };
  return { pct: Math.max(5, v / 1.35 * 35), label: 'מתחת לצפוי', color: 'var(--coral)' };
}

function getColorScore() {
  if (!state.colorResult) return null;
  var v = state.colorResult.bdi;
  if (v <= 1.2) return { pct: 90, label: 'תקין', color: 'var(--cyan)' };
  if (v <= 1.5) return { pct: 55, label: 'השפעה קלה על S-cone', color: 'var(--amber)' };
  return { pct: 25, label: 'השפעה ניכרת על S-cone', color: 'var(--coral)' };
}

function getFlickerScore() {
  if (!state.flickerResult) return null;
  var v = state.flickerResult.cff;
  if (v >= 35) return { pct: 90, label: 'תקין', color: 'var(--cyan)' };
  if (v >= 25) return { pct: 55, label: 'שינויים קלים', color: 'var(--amber)' };
  return { pct: 25, label: 'מתחת לצפוי', color: 'var(--coral)' };
}

function getTINScore() {
  if (!state.tinResult) return null;
  var v = state.tinResult.snr;
  if (v <= -12) return { pct: 95, label: 'מצוין', color: 'var(--cyan)' };
  if (v <= -8) return { pct: 80, label: 'תקין', color: 'var(--cyan)' };
  if (v <= -4) return { pct: 60, label: 'סביר', color: 'var(--amber)' };
  if (v <= 0) return { pct: 40, label: 'קושי מסוים', color: 'var(--amber)' };
  return { pct: 20, label: 'מדאיג', color: 'var(--coral)' };
}

function getGapScore() {
  if (!state.gapResult) return null;
  var v = state.gapResult.thresholdMs;
  if (v <= 5) return { pct: 90, label: 'תקין', color: 'var(--cyan)' };
  if (v <= 10) return { pct: 55, label: 'גבולי', color: 'var(--amber)' };
  return { pct: 25, label: 'מדאיג', color: 'var(--coral)' };
}

function getAMScore() {
  if (!state.amResult) return null;
  var v = state.amResult.thresholdDB;
  if (v <= -18) return { pct: 90, label: 'תקין', color: 'var(--cyan)' };
  if (v <= -12) return { pct: 55, label: 'גבולי', color: 'var(--amber)' };
  return { pct: 25, label: 'מדאיג', color: 'var(--coral)' };
}

function getComposite() {
  var weights = { cs: 0.17, color: 0.17, tin: 0.22, gap: 0.22, am: 0.22 };
  var total = 0, wSum = 0;
  var csS = getCSScore();
  var colorS = getColorScore();
  var tinS = getTINScore();
  var gapS = getGapScore();
  var amS = getAMScore();

  if (csS) { total += csS.pct * weights.cs; wSum += weights.cs; }
  if (colorS) { total += colorS.pct * weights.color; wSum += weights.color; }
  if (tinS) { total += tinS.pct * weights.tin; wSum += weights.tin; }
  if (gapS) { total += gapS.pct * weights.gap; wSum += weights.gap; }
  if (amS) { total += amS.pct * weights.am; wSum += weights.am; }

  if (wSum === 0) return 0;
  return Math.round(total / wSum);
}

function getCompositeLabel(score) {
  if (score >= 85) return 'תקין';
  if (score >= 65) return 'שינויים קלים';
  if (score >= 40) return 'בינוני';
  return 'משמעותי';
}

function getCompositeColor(score) {
  if (score >= 85) return 'var(--cyan)';
  if (score >= 65) return 'var(--amber)';
  return 'var(--coral)';
}

function buildArcSVG(score, size) {
  size = size || 160;
  var cx = size / 2;
  var radius = (size / 2) - 12;
  var circumference = 2 * Math.PI * radius;
  var pct = score / 100;
  var arcFraction = 0.75;
  var dashLen = circumference * pct * arcFraction;
  var trackLen = circumference * arcFraction;
  var color = getCompositeColor(score);
  return '<svg viewBox="0 0 ' + size + ' ' + size + '" style="display:block">' +
    '<circle cx="' + cx + '" cy="' + cx + '" r="' + radius + '" fill="none" stroke="#f0f0f0" stroke-width="14" stroke-dasharray="' + trackLen + ' ' + circumference + '" stroke-dashoffset="0" transform="rotate(135 ' + cx + ' ' + cx + ')"/>' +
    '<circle cx="' + cx + '" cy="' + cx + '" r="' + radius + '" fill="none" stroke="' + color + '" stroke-width="14" stroke-linecap="round" stroke-dasharray="' + dashLen + ' ' + circumference + '" stroke-dashoffset="0" transform="rotate(135 ' + cx + ' ' + cx + ')">' +
    '<animate attributeName="stroke-dasharray" from="0 ' + circumference + '" to="' + dashLen + ' ' + circumference + '" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>' +
    '</circle>' +
  '</svg>';
}

function buildResultCard(title, icon, value, unit, scoreObj, detail, resultObj) {
  if (!scoreObj) return '';
  // Check for insufficient data (reversals < 2)
  var insufficientData = resultObj && typeof resultObj.reversals === 'number' && resultObj.reversals < 2;
  if (insufficientData) {
    return '<div class="card result-card">' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center">' + icon + '</span><h3 style="margin:0">' + title + '</h3></div>' +
      '<p class="result-interp" style="color:var(--amber)">נתונים לא מספיקים - הבדיקה לא מצאה את הסף שלך. נסי שוב בסביבה שקטה יותר.</p>' +
      '<p class="result-detail">' + detail + '</p>' +
    '</div>';
  }
  return '<div class="card result-card">' +
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center">' + icon + '</span><h3 style="margin:0">' + title + '</h3></div>' +
    '<div class="result-value">' + value + ' <span style="font-size:14px;font-weight:500;color:var(--text-muted)">' + unit + '</span></div>' +
    '<div class="gauge"><div class="gauge-fill" style="width:' + scoreObj.pct + '%;background:' + scoreObj.color + '"></div></div>' +
    '<div class="gauge-labels"><span>מדאיג</span><span>תקין</span></div>' +
    '<p class="result-interp">' + scoreObj.label + '</p>' +
    '<p class="result-detail">' + detail + '</p>' +
  '</div>';
}

function showResults() {
  testActive = false;
  var composite = getComposite();
  var compLabel = getCompositeLabel(composite);
  saveResults(composite);

  var badgeColor = getCompositeColor(composite);
  var badgeBg = composite >= 85 ? '#e6f9f5' : composite >= 65 ? '#fdf3e2' : composite >= 40 ? '#fce8e6' : '#fce8e6';

  var html = '<div style="display:flex;flex-direction:column;flex:1">';

  // Summary label
  html += '<div class="label" style="margin-bottom:10px">סיכום</div>';

  // Title + badge
  html += '<h2 style="font-size:17px;line-height:1.3;margin-bottom:8px">\u05E6\u05D9\u05D5\u05DF SENSE\u2122 \u05E9\u05DC\u05DA:<br>\u05D0\u05D9\u05D6\u05D5\u05DF \u05D7\u05D5\u05E9\u05D9</h2>';
  html += '<div><span style="display:inline-block;background:' + badgeBg + ';color:' + badgeColor + ';font-size:11px;font-weight:700;padding:4px 14px;border-radius:14px;letter-spacing:.3px;border:1px solid ' + badgeColor + '">' + compLabel + '</span></div>';

  // Gauge row: arc left, text right - matching Peritale exactly
  html += '<div style="display:flex;align-items:center;gap:16px;margin:16px 0 12px">' +
    '<div style="position:relative;width:110px;height:110px;flex-shrink:0">' +
      buildArcSVG(composite, 110) +
      '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center"><span style="font-size:32px;font-weight:800;color:var(--navy);line-height:1">' + composite + '</span></div>' +
    '</div>' +
    '<div style="flex:1">' +
      '<p style="font-size:11.5px;color:var(--text-secondary);line-height:1.55;margin-bottom:8px">האותות החושיים שלך משקפים כיצד הראייה והשמיעה משתנות לאורך זמן בהתאם לדפוסים הקשורים לשינויים הורמונליים.</p>' +
      '<div style="display:flex;gap:16px">' +
        '<span style="font-size:11px;color:var(--text-muted)">הסבר מלא</span>' +
        '<span style="font-size:11px;color:var(--accent);font-weight:600">קראי עוד</span>' +
      '</div>' +
    '</div>' +
  '</div>';

  // Divider
  html += '<div style="height:1px;background:var(--border-light);margin:4px 0 12px"></div>';

  // Results grid - compact 2-column for vision, then hearing
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">';
  html += '<div style="grid-column:1/-1"><div class="label" style="margin:0">ראייה</div></div>';
  html += buildCompactResult('ניגודיות', state.csResult ? state.csResult.logCS : '--', 'logCS', getCSScore());
  if (state.colorResult) {
    html += buildCompactResult('צבע', state.colorResult.bdi, 'BDI', getColorScore());
  }
  html += '</div>';

  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">';
  html += '<div style="grid-column:1/-1"><div class="label" style="margin:0">שמיעה</div></div>';
  html += buildCompactResult('שמיעה', state.tinResult ? state.tinResult.snr : '--', 'dB', getTINScore());
  html += buildCompactResult('רווחים', state.gapResult ? state.gapResult.thresholdMs : '--', 'ms', getGapScore());
  html += buildCompactResult('קצב', state.amResult ? state.amResult.thresholdDB : '--', 'dB', getAMScore());
  html += '</div>';

  // Spacer
  html += '<div style="flex:1;min-height:8px"></div>';

  // Action
  html += '<button class="btn btn-primary" onclick="if(window.parent!==window)window.parent.postMessage(\'sense-done\',\'*\');">המשיכי לתוצאות</button>';
  html += '<p style="font-size:9px;color:var(--text-muted);text-align:center;margin-top:8px;line-height:1.4">אות רווחה כללי בלבד. אינו מהווה ייעוץ רפואי. (c) 2026 MARKABLE</p>';

  html += '</div>';
  render('results', html);
}

function buildCompactResult(name, value, unit, score) {
  var s = score || {pct:5,color:'var(--border)',label:''};
  var pct = s.pct || 5;
  var color = s.color || 'var(--border)';
  return '<div style="background:var(--bg-off);border:1px solid var(--border-light);border-radius:10px;padding:10px 12px">' +
    '<div style="font-size:11px;color:var(--text-muted);margin-bottom:2px">' + name + '</div>' +
    '<div style="font-size:18px;font-weight:800;color:var(--navy);line-height:1.2">' + value + ' <span style="font-size:10px;font-weight:500;color:var(--text-muted)">' + unit + '</span></div>' +
    '<div style="height:3px;background:var(--border-light);border-radius:2px;margin-top:6px;overflow:hidden"><div style="height:100%;width:' + pct + '%;background:' + color + ';border-radius:2px"></div></div>' +
  '</div>';
}

function getNextStepText(score) {
  if (score >= 85) return 'האותות החושיים שלך בטווח התקין. שקלי לחזור על הבדיקה בעוד 4-6 שבועות כדי לבסס קו בסיס אישי ולעקוב אחר שינויים לאורך זמן.';
  if (score >= 65) return 'זוהו שינויים קלים. אלו עשויים לנוד עם המחזור, איכות השינה או רמות המתח. חזרי על הבדיקה בעוד 2-4 שבועות כדי לראות אם מתגבשים דפוסים. שקלי לשוחח עם הרופא/ה שלך אם השינויים נמשכים.';
  if (score >= 40) return 'נצפו שינויים בינוניים במספר תחומים. מומלץ לחזור על הבדיקה בעוד 1-2 שבועות ולשתף את התוצאות עם הרופא/ה שלך.';
  return 'מספר אותות מחוץ לטווחים האופייניים. ממצא זה אינו מצביע על מצב ספציפי, אך מומלץ לשוחח עם הרופא/ה שלך על דפוסים אלו. גורמים סביבתיים (רעש, עייפות, איכות מסך) עשויים להשפיע על התוצאות.';
}

function buildTrend(diff) {
  if (diff > 2) return '<span class="trend trend-up">' + ICONS.trendUp + ' +' + diff + '</span>';
  if (diff < -2) return '<span class="trend trend-down">' + ICONS.trendDown + ' ' + diff + '</span>';
  return '<span class="trend trend-same">--</span>';
}

// ============================
// LOCAL STORAGE
// ============================
function saveResults(composite) {
  var entry = {
    date: new Date().toISOString(),
    composite: composite,
    contrast: state.csResult,
    color: state.colorResult,
    flicker: state.flickerResult,
    toneNoise: state.tinResult,
    gap: state.gapResult,
    am: state.amResult,
    dichotic: state.dichoticResult,
    headphones: state.useHeadphones
  };

  try {
    var history = JSON.parse(localStorage.getItem('sense_history') || '[]');
    history.push(entry);
    if (history.length > 50) history = history.slice(-50);
    localStorage.setItem('sense_history', JSON.stringify(history));
  } catch (e) {}
}

function getPreviousSession() {
  try {
    var history = JSON.parse(localStorage.getItem('sense_history') || '[]');
    if (history.length >= 2) return history[history.length - 2];
  } catch (e) {}
  return null;
}

// ============================
// RESET
// ============================
function resetAll() {
  testActive = false;
  if (FLICKER.animFrame) { cancelAnimationFrame(FLICKER.animFrame); FLICKER.animFrame = null; }
  state.csResult = null;
  state.colorResult = null;
  state.flickerResult = null;
  state.tinResult = null;
  state.gapResult = null;
  state.amResult = null;
  state.dichoticResult = null;
  state.currentTestIndex = 0;
  showIntro();
}

// ============================
// INIT
// ============================
showIntro();
</script>
</body>
</html>
