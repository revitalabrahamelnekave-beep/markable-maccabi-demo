# ============================================================================
#  PERI-AGENT — קונפיגורציה
#  סוכן קידום SEO / GEO אוטונומי ל-MARKABLE (Peritale)
# ============================================================================
#  זהו הקובץ היחיד שצריך לערוך. הסוכן קורא ממנו הכל.
#  שנה חופשי את השאילתות, המתחרים, והעמודים.
# ============================================================================

product:
  name: "MARKABLE"
  brand: "Peritale"
  url: "https://www.peritale.online/"
  language: "he"              # שפה ראשית של הקהל
  # תיאור קצר (לשימוש הסוכן ולערכת ההגשה לדיירקטוריז)
  one_liner_he: "MARKABLE הוא כלי מדעי למעקב אחר איזון הורמונלי וזיהוי מוקדם של פרימנופאוזה — ניתוח סימנים וסימפטומים תוך דקות, ללא בדיקות מעבדה, עם שמירה מלאה על פרטיות."
  one_liner_en: "MARKABLE by Peritale is a science-backed tool that detects early signs of the perimenopause transition from your symptoms and biomarkers in minutes — no lab tests, full privacy."
  categories: ["femtech", "health", "menopause", "perimenopause", "wellness", "women-health"]

# ----------------------------------------------------------------------------
#  מודל ה-LLM
# ----------------------------------------------------------------------------
#  ברירת המחדל היא המודל החזק ביותר (opus). לעלות נמוכה בהרבה החלף ל:
#    claude-haiku-4-5   (~5x זול יותר, מספיק לרוב המשימות)
#    claude-sonnet-5    (~1.6x זול מ-opus, איכות כמעט זהה)
#  הסוכן מדפיס עלות משוערת בסוף כל ריצה כדי שתוכל להחליט.
# ----------------------------------------------------------------------------
llm:
  model: "claude-opus-4-8"
  effort: "medium"            # low | medium | high — נמוך = זול ומהיר יותר
  max_web_searches: 3         # מקס' חיפושי רשת לכל שאילתת GEO (משפיע על עלות)

# ----------------------------------------------------------------------------
#  משימת 1 — אודיט ציטוטים ב-AI (GEO)
#  הסוכן שואל כל שאלה עם חיפוש רשת, ובודק אם Markable מצוטט מול מתחרים.
#  אלה השאלות שקהל היעד באמת שואל את ChatGPT / Perplexity / Google AI.
# ----------------------------------------------------------------------------
geo_queries:
  - "איך יודעים אם התחלתי פרימנופאוזה?"
  - "מה הסימנים המוקדמים של פרימנופאוזה?"
  - "אפליקציה או כלי למעקב אחר סימפטומים של פרימנופאוזה"
  - "איך לזהות חוסר איזון הורמונלי בלי בדיקות דם?"
  - "כלים דיגיטליים למעקב הורמונלי לנשים בגיל 40+"
  - "how to know if perimenopause has started"
  - "app to track perimenopause symptoms without lab tests"
  - "early signs of hormonal imbalance in women over 40"

# מתחרים ידועים (הסוכן יבדוק אם הם מצוטטים מול Markable). השאר ריק אם לא ידוע.
competitors:
  - name: "Balance / Health & Her"
    url: "balance-menopause.com"
  - name: "Caria"
    url: "mycaria.com"
  - name: "Perry"
    url: "heyperry.com"
  - name: "Stella"
    url: "onstella.com"

# ----------------------------------------------------------------------------
#  משימת 2 — אודיט GEO/SEO של עמודים
#  הסוכן מוריד כל עמוד ובודק: TL;DR, מבנה שאלה-תשובה, סכמה (schema.org),
#  200 המילים הראשונות, טבלאות, meta, כותרות, ועוד — ומחזיר המלצות.
# ----------------------------------------------------------------------------
pages_to_audit:
  - "https://www.peritale.online/"

# ----------------------------------------------------------------------------
#  משימת 3 — רעיונות מילות מפתח ופערי תוכן  (ללא עלות רשת נוספת)
# ----------------------------------------------------------------------------
keywords:
  enabled: true

# ----------------------------------------------------------------------------
#  משימת 4 — ערכת הגשה לדיירקטוריז
#  הסוכן מייצר רשימת דיירקטוריז איכותיים רלוונטיים + טקסטים מוכנים להדבקה.
#  הסוכן *לא* מגיש בעצמו — אתה מדביק ידנית (בטוח, ללא סיכון ספאם).
# ----------------------------------------------------------------------------
directories:
  enabled: true

# ----------------------------------------------------------------------------
#  פלט
# ----------------------------------------------------------------------------
output:
  dir: "reports"              # דוחות נשמרים כאן עם חותמת זמן
